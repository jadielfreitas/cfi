<script type="text/babel">
const {useState,useEffect,useRef,useCallback,useMemo}=React;

/* ════════════════════════════════════════════════════════════════════
   CFI v15 — SUPABASE SYNC + OFFLINE + SESSION PERSISTENCE
   ════════════════════════════════════════════════════════════════════ */

const SUPA_URL = 'https://cyusudtperztqdlvtxza.supabase.co';
const SUPA_KEY = 'sb_publishable_1mojcbvYkm0z17gCowfLYA_uTZZDu5h';

let supabaseClient = null;

// ✅ INICIALIZA SUPABASE CORRETAMENTE
async function initSupabase() {
  try {
    const { createClient } = window.supabase;
    supabaseClient = createClient(SUPA_URL, SUPA_KEY);
    console.log('✅ Supabase inicializado');
    return true;
  } catch (e) {
    console.error('❌ Erro ao inicializar Supabase:', e);
    return false;
  }
}

// ✅ SALVA DADOS NO SUPABASE COM FALLBACK PARA LOCALSTORAGE
async function saveData(uid, appData) {
  if (!supabaseClient || !uid) {
    localStorage.setItem('cfi_backup', JSON.stringify(appData));
    console.log('💾 Salvo localmente (sem Supabase)');
    return true;
  }

  try {
    const { error } = await supabaseClient
      .from('cfi_data')
      .upsert(
        {
          user_id: uid,
          data: appData,
          updated_at: new Date().toISOString(),
        },
        { onConflict: 'user_id' }
      );

    if (error) {
      console.error('❌ Erro Supabase:', error);
      localStorage.setItem('cfi_backup', JSON.stringify(appData));
      return false;
    }

    console.log('☁️  Salvo no Supabase');
    return true;
  } catch (err) {
    console.error('❌ Exceção:', err);
    localStorage.setItem('cfi_backup', JSON.stringify(appData));
    return false;
  }
}

// ✅ CARREGA DADOS DO SUPABASE OU LOCALSTORAGE
async function loadData(uid) {
  if (!supabaseClient || !uid) {
    const backup = localStorage.getItem('cfi_backup');
    if (backup) {
      console.log('📂 Carregado do localStorage');
      return JSON.parse(backup);
    }
    return null;
  }

  try {
    const { data, error } = await supabaseClient
      .from('cfi_data')
      .select('data')
      .eq('user_id', uid)
      .single();

    if (error || !data) {
      console.log('📂 Supabase vazio, usando backup local');
      const backup = localStorage.getItem('cfi_backup');
      return backup ? JSON.parse(backup) : null;
    }

    console.log('☁️  Carregado do Supabase');
    return data.data;
  } catch (err) {
    console.error('❌ Erro ao carregar:', err);
    const backup = localStorage.getItem('cfi_backup');
    return backup ? JSON.parse(backup) : null;
  }
}

// ✅ VERIFICA SESSÃO
async function checkSession() {
  if (!supabaseClient) return null;

  try {
    const { data: { session } } = await supabaseClient.auth.getSession();
    if (session?.user) {
      return { uid: session.user.id, email: session.user.email };
    }
  } catch (e) {
    console.log('Sem sessão ativa');
  }

  return null;
}

// ✅ SIGNUP
async function signup(email, password) {
  if (!supabaseClient) return { ok: false, e: 'Supabase não inicializado' };

  try {
    const { data, error } = await supabaseClient.auth.signUp({ 
      email, 
      password 
    });

    if (error) return { ok: false, e: error.message };
    if (!data.user) return { ok: false, e: 'Erro ao criar conta' };

    return { ok: true, uid: data.user.id, email };
  } catch (e) {
    return { ok: false, e: e.message };
  }
}

// ✅ LOGIN
async function login(email, password) {
  if (!supabaseClient) return { ok: false, e: 'Supabase não inicializado' };

  try {
    const { data, error } = await supabaseClient.auth.signInWithPassword({ 
      email, 
      password 
    });

    if (error) return { ok: false, e: error.message };
    if (!data.user) return { ok: false, e: 'Autenticação falhou' };

    return { ok: true, uid: data.user.id, email };
  } catch (e) {
    return { ok: false, e: e.message };
  }
}

// ✅ LOGOUT
async function logout() {
  if (!supabaseClient) return;
  try {
    await supabaseClient.auth.signOut();
    localStorage.removeItem('cfi_session');
    console.log('✅ Logout realizado');
  } catch (e) {
    console.error('Erro ao fazer logout:', e);
  }
}

// ════════════════════════════════════════════════════════════════════
// APP COMPONENT
// ════════════════════════════════════════════════════════════════════

function App() {
  const [initialized, setInitialized] = useState(false);
  const [session, setSession] = useState(null);
  const [loading, setLoading] = useState(true);
  const [data, setData] = useState({ profile: {}, companies: [] });
  const [autoSaveTimer, setAutoSaveTimer] = useState(null);

  // ✅ INICIALIZA TUDO
  useEffect(() => {
    async function init() {
      await initSupabase();
      
      const sess = await checkSession();
      if (sess) {
        setSession(sess);
        const appData = await loadData(sess.uid);
        if (appData) {
          setData(appData);
        }
      }

      setInitialized(true);
      setLoading(false);
    }

    init();
  }, []);

  // ✅ AUTO-SAVE A CADA 5 SEGUNDOS
  useEffect(() => {
    if (!session) return;

    const timer = setInterval(() => {
      saveData(session.uid, data);
    }, 5000);

    return () => clearInterval(timer);
  }, [session, data]);

  const handleLogin = async (email, password) => {
    setLoading(true);
    const result = await login(email, password);
    
    if (result.ok) {
      setSession({ uid: result.uid, email: result.email });
      const appData = await loadData(result.uid);
      if (appData) {
        setData(appData);
      }
    } else {
      alert('❌ ' + result.e);
    }
    setLoading(false);
  };

  const handleSignup = async (email, password) => {
    setLoading(true);
    const result = await signup(email, password);
    
    if (result.ok) {
      alert('✅ Cadastro realizado! Verifique seu email e faça login.');
    } else {
      alert('❌ ' + result.e);
    }
    setLoading(false);
  };

  const handleLogout = async () => {
    if (window.confirm('Sair?')) {
      await logout();
      setSession(null);
      setData({ profile: {}, companies: [] });
    }
  };

  const handleUpdateData = (newData) => {
    setData(newData);
  };

  if (loading) {
    return (
      <div style={{
        display: 'flex',
        alignItems: 'center',
        justifyContent: 'center',
        minHeight: '100dvh',
        background: 'var(--bg)',
        color: 'var(--text)',
      }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16 }}>⏳</div>
          <div>Carregando CFI...</div>
        </div>
      </div>
    );
  }

  if (!session) {
    return <AuthScreen onLogin={handleLogin} onSignup={handleSignup} />;
  }

  return (
    <MainApp 
      session={session}
      data={data}
      onUpdate={handleUpdateData}
      onLogout={handleLogout}
    />
  );
}

// ════════════════════════════════════════════════════════════════════
// AUTH SCREEN
// ════════════════════════════════════════════════════════════════════

function AuthScreen({ onLogin, onSignup }) {
  const [email, setEmail] = useState('');
  const [password, setPassword] = useState('');
  const [isSignup, setIsSignup] = useState(false);
  const [loading, setLoading] = useState(false);

  const handleSubmit = async () => {
    if (!email || !password) {
      alert('Preencha email e senha');
      return;
    }

    setLoading(true);
    if (isSignup) {
      await onSignup(email, password);
    } else {
      await onLogin(email, password);
    }
    setLoading(false);
  };

  return (
    <div style={{
      display: 'flex',
      alignItems: 'center',
      justifyContent: 'center',
      minHeight: '100dvh',
      padding: 20,
      background: 'var(--bg)',
    }}>
      <div style={{
        maxWidth: 420,
        width: '100%',
        textAlign: 'center',
      }}>
        <div style={{
          fontSize: 64,
          fontWeight: 900,
          color: 'var(--gold)',
          marginBottom: 8,
          fontFamily: 'var(--mono)',
        }}>CFI</div>
        <div style={{
          color: 'var(--t2)',
          fontSize: 14,
          marginBottom: 32,
        }}>The Power of Decision</div>

        <div style={{
          background: 'var(--s2)',
          border: '1px solid var(--border)',
          borderRadius: 'var(--rl)',
          padding: 28,
        }}>
          <input
            type="email"
            placeholder="Email"
            value={email}
            onChange={(e) => setEmail(e.target.value)}
            className="inp"
            style={{ marginBottom: 12 }}
          />
          <input
            type="password"
            placeholder="Senha"
            value={password}
            onChange={(e) => setPassword(e.target.value)}
            className="inp"
            style={{ marginBottom: 20 }}
          />
          <button
            onClick={handleSubmit}
            disabled={loading}
            style={{
              width: '100%',
              padding: 14,
              background: 'var(--gold)',
              color: '#000',
              border: 'none',
              borderRadius: 'var(--r)',
              fontWeight: 700,
              cursor: loading ? 'not-allowed' : 'pointer',
              opacity: loading ? 0.7 : 1,
              fontSize: 15,
              marginBottom: 12,
            }}>
            {loading ? '⏳ Aguarde...' : isSignup ? 'Cadastrar' : 'Entrar'}
          </button>

          <button
            onClick={() => setIsSignup(!isSignup)}
            style={{
              width: '100%',
              padding: 12,
              background: 'transparent',
              border: '1px solid var(--border)',
              borderRadius: 'var(--r)',
              color: 'var(--t2)',
              cursor: 'pointer',
              fontSize: 14,
            }}>
            {isSignup ? 'Já tem conta? Entrar' : 'Novo usuário? Cadastrar'}
          </button>
        </div>

        <div style={{
          marginTop: 20,
          fontSize: 12,
          color: 'var(--t3)',
          lineHeight: 1.6,
        }}>
          <strong>Demo:</strong><br/>
          📧 teste@cfi.com<br/>
          🔑 senha123
        </div>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// MAIN APP
// ════════════════════════════════════════════════════════════════════

function MainApp({ session, data, onUpdate, onLogout }) {
  const handleAddOpportunity = () => {
    const newCompany = {
      id: Date.now(),
      company: '',
      role: '',
      stage: 'apply',
      city: '',
      status: 'ativo',
      notes: '',
      ans: {},
      coAns: {},
      psyAns: {},
      masterAns: {},
      createdAt: new Date().toISOString(),
    };

    onUpdate({
      ...data,
      companies: [...data.companies, newCompany],
    });
  };

  const handleUpdateCompany = (id, updates) => {
    onUpdate({
      ...data,
      companies: data.companies.map((c) =>
        c.id === id ? { ...c, ...updates } : c
      ),
    });
  };

  const handleDeleteCompany = (id) => {
    onUpdate({
      ...data,
      companies: data.companies.filter((c) => c.id !== id),
    });
  };

  return (
    <div style={{
      background: 'var(--bg)',
      color: 'var(--text)',
      minHeight: '100dvh',
    }}>
      {/* HEADER */}
      <div style={{
        padding: '16px 24px',
        borderBottom: '1px solid var(--border)',
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'center',
      }}>
        <div>
          <div style={{ fontSize: 24, fontWeight: 900 }}>CFI</div>
          <div style={{ fontSize: 12, color: 'var(--t2)' }}>
            {session.email}
          </div>
        </div>
        <button
          onClick={onLogout}
          style={{
            background: 'var(--s3)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: '8px 16px',
            cursor: 'pointer',
            color: 'var(--t1)',
            fontWeight: 700,
          }}>
          Sair
        </button>
      </div>

      {/* MAIN */}
      <div style={{ padding: '20px 24px', maxWidth: 1200, margin: '0 auto' }}>
        <div style={{
          display: 'flex',
          justifyContent: 'space-between',
          alignItems: 'center',
          marginBottom: 20,
        }}>
          <h1>Oportunidades ({data.companies.length})</h1>
          <button
            onClick={handleAddOpportunity}
            style={{
              background: 'var(--gold)',
              color: '#000',
              border: 'none',
              borderRadius: 'var(--r)',
              padding: '10px 20px',
              cursor: 'pointer',
              fontWeight: 700,
            }}>
            + Adicionar
          </button>
        </div>

        {data.companies.length === 0 ? (
          <div style={{
            background: 'var(--s2)',
            border: '2px dashed var(--border)',
            borderRadius: 'var(--rl)',
            padding: 40,
            textAlign: 'center',
            color: 'var(--t2)',
          }}>
            <div style={{ fontSize: 40, marginBottom: 12 }}>🎯</div>
            <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 8 }}>
              Nenhuma oportunidade
            </div>
            <div>Clique em "+ Adicionar" para começar</div>
          </div>
        ) : (
          <div style={{
            display: 'grid',
            gap: 12,
            gridTemplateColumns: 'repeat(auto-fill, minmax(300px, 1fr))',
          }}>
            {data.companies.map((company) => (
              <CompanyCard
                key={company.id}
                company={company}
                onUpdate={(updates) =>
                  handleUpdateCompany(company.id, updates)
                }
                onDelete={() => handleDeleteCompany(company.id)}
              />
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// COMPANY CARD
// ════════════════════════════════════════════════════════════════════

  if (editing) {

      <EditForm
        company={company}
        onSave={(updates) => {
          onUpdate(updates);
          setEditing(false);
        }}
        onCancel={() => setEditing(false)}
      />

  }

  return (
    <div
      style={{
        background: 'var(--s2)',
        border: '1px solid var(--border)',
        borderRadius: 'var(--rl)',
        padding: 20,
      }}>
      <div style={{
        display: 'flex',
        justifyContent: 'space-between',
        alignItems: 'start',
        marginBottom: 12,
      }}>
        <div>
          <div style={{ fontSize: 18, fontWeight: 700, marginBottom: 4 }}>
            {company.company || 'Sem empresa'}
          </div>
          <div style={{ color: 'var(--t2)', fontSize: 13 }}>
            {company.role || 'Sem cargo'}
          </div>
          <div style={{ color: 'var(--t3)', fontSize: 12, marginTop: 4 }}>
            {company.city && `📍 ${company.city}`}
          </div>
        </div>
        <div style={{
          background: 'var(--s3)',
          padding: '4px 12px',
          borderRadius: 'var(--r)',
          fontSize: 12,
          fontWeight: 700,
          color: 'var(--gold)',
        }}>
          {company.stage || 'apply'}
        </div>
      </div>

      {company.notes && (
        <div style={{
          background: 'var(--s3)',
          border: '1px solid var(--border)',
          borderRadius: 'var(--r)',
          padding: 10,
          marginBottom: 12,
          fontSize: 12,
          color: 'var(--t2)',
        }}>
          {company.notes}
        </div>
      )}

      <div style={{
        display: 'flex',
        gap: 8,
        justifyContent: 'flex-end',
      }}>
        <button
          onClick={() => setEditing(true)}
          style={{
            background: 'var(--s3)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: '7px 14px',
            cursor: 'pointer',
            color: 'var(--t1)',
            fontSize: 13,
            fontWeight: 700,
          }}>
          ✏️ Editar
        </button>
        <button
          onClick={() => {
            if (window.confirm('Deletar?')) {
              onDelete();
            }
          }}
          style={{
            background: 'rgba(255, 59, 48, 0.1)',
            border: '1px solid rgba(255, 59, 48, 0.3)',
            borderRadius: 'var(--r)',
            padding: '7px 14px',
            cursor: 'pointer',
            color: 'var(--red)',
            fontSize: 13,
            fontWeight: 700,
          }}>
          🗑️ Deletar
        </button>
      </div>
    </div>
  );
}

      }}>
        <button
          onClick={onCancel}
          style={{
            background: 'var(--s3)',
            border: '1px solid var(--border)',
            borderRadius: 'var(--r)',
            padding: '10px 20px',
            cursor: 'pointer',
            color: 'var(--t1)',
            fontWeight: 700,
          }}>
          Cancelar
        </button>
        <button
          onClick={() => onSave(form)}
          style={{
            background: 'var(--gold)',
            color: '#000',
            border: 'none',
            borderRadius: 'var(--r)',
            padding: '10px 20px',
            cursor: 'pointer',
            fontWeight: 700,
          }}>
          ✅ Salvar
        </button>
      </div>
    </div>
  );
}

// ════════════════════════════════════════════════════════════════════
// RENDER
// ════════════════════════════════════════════════════════════════════

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
