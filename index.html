          </Card>
        );
      })()}
      <button onClick={()=>{onSave(f);setSaved(true);setTimeout(()=>setSaved(false),2200);}}
        style={{width:'100%',padding:15,background:saved?'var(--green)':'var(--gold)',
          color:'#000',border:'none',borderRadius:'var(--r)',cursor:'pointer',
          fontSize:16,fontWeight:800,transition:'background .3s'}}>
        {saved?'✓ Saved!':'💾 Save Profile'}
      </button>
    </div>);}

/* ════════════ AUTH SCREEN ════════════ */
function AuthScreen({onAuth}){
  const [mode,setMode]=React.useState('login');
  const [em,setEm]=React.useState('');
  const [pw,setPw]=React.useState('');
  const [busy,setBusy]=React.useState(false);
  const [err,setErr]=React.useState('');
  const [msg,setMsg]=React.useState('');

  async function submit(){
    if(!em||!pw){setErr('Preencha email e senha.');return;}
    if(pw.length<6){setErr('Senha minima 6 caracteres.');return;}
    setBusy(true);setErr('');setMsg('');
    const r=mode==='login'?await _login(em.trim().toLowerCase(),pw):await _signup(em.trim().toLowerCase(),pw);
    setBusy(false);
    if(!r.ok){setErr(r.e);return;}
    _setSess({uid:r.uid,em:r.em});
    onAuth({uid:r.uid,em:r.em});
  }

  return(
    <div style={{minHeight:'100dvh',display:'flex',alignItems:'center',
      justifyContent:'center',background:'var(--bg)',padding:20}}>
      <div style={{width:'100%',maxWidth:380}}>
        <div style={{textAlign:'center',marginBottom:36}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--t3)',letterSpacing:'.24em',
            textTransform:'uppercase',marginBottom:6}}>Career Funnel Intelligence</div>
          <div style={{fontSize:48,fontWeight:900,color:'var(--gold)',letterSpacing:'-3px',
            fontFamily:'var(--mono)',lineHeight:1}}>CFI</div>
          <div style={{fontSize:9,color:'var(--t4)',fontWeight:700,letterSpacing:'.18em',
            textTransform:'uppercase',marginTop:6}}>The Power of Decision · DSS v15</div>
        </div>

        <Card sx={{padding:24}}>
          <div style={{display:'flex',background:'var(--s3)',borderRadius:'var(--r)',padding:3,marginBottom:18,gap:3}}>
            {['login','signup'].map(m=>(
              <button key={m} onClick={()=>{setMode(m);setErr('');setMsg('');}}
                style={{flex:1,padding:'9px 0',background:mode===m?'var(--gold)':'none',
                  color:mode===m?'#000':'var(--t3)',border:'none',borderRadius:6,
                  cursor:'pointer',fontSize:13,fontWeight:700,transition:'all .15s'}}>
                {m==='login'?'Entrar':'Criar Conta'}
              </button>
            ))}
          </div>

          <div style={{display:'flex',flexDirection:'column',gap:10}}>
            <input className="inp" type="email" placeholder="seu@email.com"
              value={em} onChange={e=>setEm(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submit()}/>
            <input className="inp" type="password" placeholder="Senha (min. 6 caracteres)"
              value={pw} onChange={e=>setPw(e.target.value)}
              onKeyDown={e=>e.key==='Enter'&&submit()}/>
            {err&&<div style={{fontSize:12,color:'var(--red)',padding:'8px 12px',
              background:'rgba(255,59,48,.08)',borderRadius:'var(--r)',border:'1px solid rgba(255,59,48,.2)'}}>
              {err}
            </div>}
            {msg&&<div style={{fontSize:12,color:'var(--green)',padding:'8px 12px',
              background:'rgba(0,212,126,.08)',borderRadius:'var(--r)'}}>
              {msg}
            </div>}
            <button onClick={submit} disabled={busy}
              style={{marginTop:4,padding:14,
                background:busy?'var(--s4)':'var(--gold)',
                color:busy?'var(--t3)':'#000',
                border:'none',borderRadius:'var(--r)',
                cursor:busy?'not-allowed':'pointer',
                fontSize:15,fontWeight:800,
                display:'flex',alignItems:'center',justifyContent:'center',gap:8,
                transition:'background .15s'}}>
              {busy?<><Spin sz={16}/><span>Aguarde...</span></>:
                mode==='login'?'Entrar':'Criar Conta'}
            </button>
          </div>
        </Card>

        <div style={{textAlign:'center',marginTop:14,fontSize:11,color:'var(--t4)',fontFamily:'var(--mono)'}}>
          Dados salvos na nuvem · Gratuito · Seguro
        </div>
      </div>
    </div>);
}

/* ════════════ ROOT APP ════════════ */
function App(){
  const [jbs,setJbs]=useState(()=>_getSess());
  const [syncing,setSyncing]=useState(false);
  const _st=useRef(null);
  const _cloudLoading=useRef(false);
  const [data,setData]=useState(()=>{
    const s=hydrate();
    return{profile:s?.profile||null,companies:s?.companies||[]};
  });
  const [view,setView]=useState('dash');
  const [selId,setSelId]=useState(null);
  const [showAdd,setShowAdd]=useState(false);

  useEffect(()=>{
    /* Check if Supabase has an active session (works on any device) */
    _checkSession().then(sess=>{
      if(sess){
        /* Supabase session found, restore/confirm it */
        setJbs({uid:sess.uid,em:sess.em});
        _setSess({uid:sess.uid,em:sess.em});
        _cloudLoading.current=true;
        _load(sess.uid).then(d=>{
          if(d&&(d.profile||d.companies?.length))
            setData({profile:d.profile||null,companies:d.companies||[]});
          setTimeout(()=>{_cloudLoading.current=false;},500);
        });
      } else if(jbs&&!jbs.offline&&jbs.uid){
        _cloudLoading.current=true;
        _load(jbs.uid).then(d=>{
          if(d&&(d.profile||d.companies?.length))
            setData({profile:d.profile||null,companies:d.companies||[]});
          setTimeout(()=>{_cloudLoading.current=false;},500);
        });
      }
    });
  },[]);

  useEffect(()=>{
    persist(data);
    if(!jbs||!jbs.uid||jbs.offline)return;
    if(_cloudLoading.current)return;
    if(_st.current)clearTimeout(_st.current);
    _st.current=setTimeout(async()=>{
      setSyncing(true);
      const ok=await _save(jbs.uid,data);
      setSyncing(false);
      if(!ok)console.warn('CFI: dados nao salvos na nuvem');
    },2500);
  },[data]);

  function nav(v,id=null){setView(v);if(id!==null)setSelId(id);}
  function upsert(co){
    setData(d=>({...d,companies:
      d.companies.find(c=>c.id===co.id)
        ?d.companies.map(c=>c.id===co.id?co:c)
        :[...d.companies,co]}));
  }
  function del(id){
    setData(d=>({...d,companies:d.companies.filter(c=>c.id!==id)}));
    if(selId===id){setSelId(null);setView('pipeline');}
  }
  /* v10: pass companies to IntelTab via detail nav */

  if(!jbs)return(
    <div>
      {data.profile&&(
        <div style={{position:'fixed',top:0,left:0,right:0,zIndex:999,
          background:'rgba(255,184,0,.12)',borderBottom:'1px solid #FFB80044',
          padding:'10px 18px',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
          <div style={{fontSize:12,color:'var(--gold)',fontWeight:700}}>
            Dados locais detectados. Faca login para sincronizar.
          </div>
          <button onClick={()=>setJbs({bid:null,em:'local',offline:true})}
            style={{background:'none',border:'1px solid #FFB80066',borderRadius:'var(--r)',
              cursor:'pointer',color:'var(--gold)',fontSize:11,padding:'4px 10px',whiteSpace:'nowrap',fontWeight:700}}>
            Usar offline
          </button>
        </div>
      )}
      <div style={{marginTop:data.profile?52:0}}>
        <AuthScreen onAuth={s=>{
          _cloudLoading.current=true;
          setJbs(s);
          _load(s.uid).then(d=>{
            if(d&&(d.profile||d.companies?.length)){
              setData({profile:d.profile||null,companies:d.companies||[]});
            }
            setTimeout(()=>{_cloudLoading.current=false;},500);
          });
        }}/>
      </div>
    </div>);

  if(!data.profile)return <Onboarding onDone={d=>setData(p=>({...p,...d}))}/>;

  const {profile,companies}=data;
  const sel=companies.find(c=>c.id===selId);
  const navItems=[
    {k:'dash',    l:'Dashboard',i:'◈'},
    {k:'pipeline',l:'Funnel',   i:'◉'},
    {k:'report',  l:'Report',   i:'◎'},
    {k:'profile', l:'Profile',  i:'○'},
  ];

  return(
    <div className="lay" style={{minHeight:'100dvh'}}>
      <aside className="sb np" style={{background:'var(--s1)',borderRight:'1px solid var(--border)',
        display:'flex',flexDirection:'column',position:'sticky',top:0,height:'100dvh',overflowY:'auto'}}>
        <div style={{padding:'18px 18px 14px',borderBottom:'1px solid var(--border)'}}>
          <div style={{fontSize:9,fontWeight:700,color:'var(--t3)',letterSpacing:'.24em',
            textTransform:'uppercase',marginBottom:4}}>Career Funnel Intelligence</div>
          <div style={{fontSize:32,fontWeight:900,color:'var(--gold)',letterSpacing:'-2px',
            fontFamily:'var(--mono)',lineHeight:1}}>CFI</div>
          <div style={{fontSize:9,color:'var(--t4)',fontWeight:700,letterSpacing:'.18em',
            textTransform:'uppercase',marginTop:3}}>The Power of Decision · DSS v15</div>
        </div>
        <div style={{padding:'12px 18px',borderBottom:'1px solid var(--border)'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
            <div style={{fontSize:14,fontWeight:700}}>{profile.name}</div>
            {jbs&&<button onClick={()=>{_clrSess();setJbs(null);persist({profile:null,companies:[]});setData({profile:null,companies:[]});setView('dash');setSelId(null);setShowAdd(false);}}
              style={{background:'none',border:'1px solid var(--border)',cursor:'pointer',
                color:'var(--t3)',fontSize:10,padding:'2px 8px',borderRadius:'var(--r)',fontWeight:600}}>
              Sair
            </button>}
          </div>
          <div style={{fontSize:12,color:'var(--t2)',marginTop:1}}>{profile.role||profile.area}</div>
          <div style={{fontSize:9,color:syncing?'#FFB800':jbs?'var(--green)':'var(--t4)',fontFamily:'var(--mono)',marginTop:3}}>
            {syncing?'salvando...':jbs&&jbs.uid&&!jbs.offline?'☁ nuvem ativa':'◉ local'}
          </div>
          {profile.discSeq?.length>0&&(
            <div style={{display:'flex',gap:4,marginTop:6,flexWrap:'wrap'}}>
              {profile.discSeq.map((id,i)=>{
                const d=DISC_DIM.find(x=>x.id===id);
                return <Tag key={id} label={`${i+1}°${id}`} color={d?.color||'var(--t3)'} sm/>;
              })}
            </div>
          )}
        </div>
        <div style={{padding:'10px 10px 0'}}>
          {navItems.map(n=>{
            const active=view===n.k&&!selId;
            return(
              <button key={n.k} onClick={()=>{setView(n.k);setSelId(null);setShowAdd(false);}}
                style={{width:'100%',padding:'10px 12px',
                  background:active?'var(--s3)':'none',
                  border:`1px solid ${active?'var(--border2)':'transparent'}`,
                  borderRadius:'var(--r)',cursor:'pointer',textAlign:'left',
                  display:'flex',alignItems:'center',gap:10,marginBottom:3,
                  transition:'all .15s'}}>
                <span style={{fontSize:15,color:active?'var(--gold)':'var(--t3)'}}>{n.i}</span>
                <span style={{fontSize:14,fontWeight:active?800:500,
                  color:active?'var(--text)':'var(--t2)'}}>{n.l}</span>
              </button>);})}
        </div>
        <div style={{flex:1,padding:'6px 10px',overflowY:'auto'}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',padding:'8px 12px 6px'}}>
            <Lbl c="var(--t4)">Opportunities</Lbl>
            <button onClick={()=>setShowAdd(true)}
              style={{background:'var(--gd)',border:'1px solid #FFB80044',borderRadius:6,
                padding:'2px 8px',cursor:'pointer',color:'var(--gold)',fontSize:14,fontWeight:900}}>+</button>
          </div>
          {companies.map(co=>{
            const fs=calcFinalScore(co.stage,co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{},co.wstars||DEFAULT_WSTARS);
            const a=calcAdh(co.ans||{},co.wstars||DEFAULT_WSTARS);
            const active=selId===co.id;
            const st=PIPE.find(s=>s.id===co.stage);
            const fl=fs>0?finalLabel(fs):null;
            return(
              <button key={co.id} onClick={()=>{setSelId(co.id);setView('detail');}}
                style={{width:'100%',padding:'8px 12px',
                  background:active?'var(--s3)':'none',
                  border:`1px solid ${active?'var(--border2)':'transparent'}`,
                  borderRadius:'var(--r)',cursor:'pointer',textAlign:'left',
                  display:'flex',alignItems:'center',gap:8,marginBottom:2,transition:'all .15s'}}>
                <div style={{width:7,height:7,borderRadius:'50%',flexShrink:0,
                  background:co.color||st?.color||'var(--t4)'}}/>
                <div style={{flex:1,minWidth:0}}>
                  <div style={{fontSize:13,fontWeight:700,
                    color:active?'var(--text)':'var(--t1)',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co.company}</div>
                  <div style={{fontSize:11,color:'var(--t3)',
                    overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co.role}</div>
                </div>
                <div style={{flexShrink:0}}>
                  {(()=>{
                  const qs2=calcQualScore(co);
                  const pm2=calcProfileMatch(co,profile);
                  const comb=Math.round(fs*0.65+qs2*0.20+pm2*0.15);
                  const fl2=calcFitLabel(comb,qs2);
                  return fl||fs>0
                    ?<span style={{fontFamily:'var(--mono)',fontSize:11,color:fl2.c,fontWeight:700}}>{fl2.icon}{comb}%</span>
                    :a>0?<span style={{fontFamily:'var(--mono)',fontSize:11,color:'#FFB800',fontWeight:700}}>{a}%</span>
                    :null;
                })()}
                </div>
              </button>);})}
        </div>
        <div style={{padding:'10px 18px',borderTop:'1px solid var(--border)'}}>
          {jbs&&jbs.uid&&!jbs.offline&&(
            <button onClick={async()=>{
              setSyncing(true);
              const ok=await _save(jbs.uid,data);
              setSyncing(false);
              if(ok){alert('✓ Dados salvos na nuvem com sucesso!\nAbra em outro dispositivo e faça login para confirmar.');}
              else{alert('Erro ao salvar.\nVerifique:\n1. Supabase: Authentication > Settings > desative Email Confirmation\n2. SQL foi executado corretamente\n3. Conexão com internet');}
            }}
            style={{width:'100%',padding:'8px',background:'var(--s3)',
              border:'1px solid var(--border)',borderRadius:'var(--r)',
              cursor:'pointer',color:'var(--gold)',fontSize:12,fontWeight:700,
              marginBottom:6,display:'flex',alignItems:'center',justifyContent:'center',gap:6}}>
              {syncing?'Salvando...':'☁ Salvar na Nuvem'}
            </button>
          )}
          <div style={{fontSize:11,color:'var(--t4)',textAlign:'center'}}>
            {companies.length} vagas · CFI-v15.15
          </div>
        </div>
      </aside>

      <main className="main" style={{overflowY:'auto',minHeight:'100dvh'}}>
        {view==='dash'&&!selId&&<Dashboard companies={companies} profile={profile} nav={nav} onAdd={()=>setShowAdd(true)}/>}
        {view==='pipeline'&&!selId&&<PipelineView companies={companies} nav={nav} onDelete={del} onAdd={()=>setShowAdd(true)} onUpdate={upsert}/>}
        {view==='detail'&&sel&&<DetailView company={sel} profile={profile} onUpdate={upsert} onBack={()=>{setSelId(null);setView('pipeline');}}/>}
        {view==='report'&&!selId&&<ReportView companies={companies} profile={profile} data={data} onImport={d=>{setData(d);setView('dash');}}/>}
        {view==='profile'&&!selId&&<ProfilePage profile={profile} onSave={p=>setData(d=>({...d,profile:p}))}/>}
      </main>

      <nav className="mnav np" style={{position:'fixed',bottom:0,left:0,right:0,
        background:'rgba(0,0,0,.97)',borderTop:'1px solid var(--border)',
        backdropFilter:'blur(20px)',display:'flex',zIndex:500}}>
        {navItems.map(n=>{
          const active=view===n.k&&!selId;
          return(
            <button key={n.k} onClick={()=>{setView(n.k);setSelId(null);setShowAdd(false);}}
              style={{flex:1,padding:'10px 4px 8px',background:'none',border:'none',cursor:'pointer',
                borderTop:`2px solid ${active?'var(--gold)':'transparent'}`,
                display:'flex',flexDirection:'column',alignItems:'center',gap:3,transition:'all .15s'}}>
              <span style={{fontSize:18,color:active?'var(--gold)':'var(--t4)'}}>{n.i}</span>
              <span style={{fontSize:9,fontWeight:active?800:500,letterSpacing:'.1em',
                textTransform:'uppercase',color:active?'var(--gold)':'var(--t4)'}}>{n.l}</span>
            </button>);})}
        <button onClick={()=>setShowAdd(true)}
          style={{flex:1,padding:'10px 4px 8px',background:'none',border:'none',cursor:'pointer',
            borderTop:'2px solid transparent',display:'flex',flexDirection:'column',alignItems:'center',gap:3}}>
          <span style={{fontSize:22,color:'var(--gold)',lineHeight:1}}>+</span>
          <span style={{fontSize:9,fontWeight:800,letterSpacing:'.1em',textTransform:'uppercase',color:'var(--gold)'}}>New</span>
        </button>
      </nav>

      {showAdd&&(
        <Modal title="+ New Opportunity" onClose={()=>setShowAdd(false)} wide>
          <OppForm onSave={co=>{upsert(co);setShowAdd(false);setSelId(co.id);setView('detail');}} onClose={()=>setShowAdd(false)}/>
        </Modal>
      )}
    </div>);}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
