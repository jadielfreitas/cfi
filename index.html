function discInterpret(seq=[]){
  if(!seq.length)return'';

  const pdesc=DISC_DIM.find(d=>d.id===primary)?.desc||'';
  const sdesc=second?DISC_DIM.find(d=>d.id===second)?.desc||'':'';

   Pesos das dimensões no score final:

/* Converte estrelas 1-5 de pesos em percentuais normalizados */
function normalizeStarWeights(stars=DEFAULT_WSTARS){
  const total=Object.values(stars).reduce((s,v)=>s+(v||1),0);
  const out={};
  Object.keys(DEFAULT_WSTARS).forEach(k=>{ out[k]=Math.round(((stars[k]||1)/total)*100); });
  return out;
}

function calcAdh(ans={},wstars=DEFAULT_WSTARS){
  const weights=normalizeStarWeights(wstars);
  let num=0,den=0;
  FACTORS.forEach(f=>{
    const vs=f.questions.map(q=>parseFloat(ans[q.id])||0).filter(v=>v>0);
    if(!vs.length)return;
    const avg=vs.reduce((a,b)=>a+b,0)/vs.length;
    const norm=(avg-1)/4;
    const w=weights[f.id]||20;
    num+=norm*w;den+=w;
  });
  return den?Math.round((num/den)*100):0;
}

/* Motor Bayesiano de probabilidade por estágio
   Benchmarks SHRM/LinkedIn/McKinsey + ajuste por qualidade do candidato */
function calcCandProb(stageId,ans={},wstars=DEFAULT_WSTARS){
  const stage=PIPE.find(s=>s.id===stageId);
  if(!stage||['no','done'].includes(stageId))return 0;
  const ceilings={map:.05,apply:.13,hr1:.26,hr2:.42,mgr:.59,final:.76,offer:.94};
  const floor=stage.base,ceil=ceilings[stageId]||.5;
  const mktVs=FACTORS.find(f=>f.id==='mkt').questions.map(q=>parseFloat(ans[q.id])||0).filter(v=>v>0);
  const coVs= FACTORS.find(f=>f.id==='co').questions.map(q=>parseFloat(ans[q.id])||0).filter(v=>v>0);
  const carVs=FACTORS.find(f=>f.id==='car').questions.map(q=>parseFloat(ans[q.id])||0).filter(v=>v>0);
  const mA=mktVs.length?(mktVs.reduce((a,b)=>a+b,0)/mktVs.length):2.5;
  const cA=coVs.length?(coVs.reduce((a,b)=>a+b,0)/coVs.length):2.5;
  const rA=carVs.length?(carVs.reduce((a,b)=>a+b,0)/carVs.length):2.5;
  const q=(((mA-1)/4)*.55)+(((cA-1)/4)*.30)+(((rA-1)/4)*.15);
  const sen=parseFloat(ans.m3)||2.5;
  const pen=sen<2?.76:sen<3?.91:1;
  return Math.round(Math.min(ceil,Math.max(floor,(floor+(ceil-floor)*q)*pen))*100);
}

function calcCoScore(coAns={}){
  let num=0,den=0;
  CO_FACTORS.forEach(f=>{
    const vs=f.questions.map(q=>parseFloat(coAns[q.id])||0).filter(v=>v>0);
    if(!vs.length)return;
    const avg=vs.reduce((a,b)=>a+b,0)/vs.length;
    const norm=(avg-1)/4;
    const w=CO_W[f.id]||20;
    num+=norm*w;den+=w;
  });
  return den?Math.round((num/den)*100):0;
}

function calcPsyScore(psyAns={}){

function calcMasterScore(masterAns={}){
  const vals=MASTER_Q.map(q=>masterAns[q.id]).filter(v=>v!==undefined&&v!==null);
  if(!vals.length)return 0;

}

/* Score final: Triple Matrix + Masters
   Candidato 28% · Empresa 32% · Psicologia 22% · Masters 8% · + Bayesian boost por stage */
/* ── v10 DSS ENGINE ── */
function calcCoScore_v10(coAns){
  const c=so(coAns);
  const W={cf_proc:18,cf_dec:30,cf_fit:24,cf_neg:18,cf_risk:10};
  let num=0,den=0;
  CO_FACTORS.forEach(f=>{
    let avg;
    if(f.id==='cf_dec'){
      const d1=sv(c.d1),d2=sv(c.d2),d3=sv(c.d3),d4=sv(c.d4);
      if(![d1,d2,d3,d4].some(v=>v>0))return;
      avg=d1*0.35+d2*0.35+d3*0.15+d4*0.15;
    }else{
      const vs=f.questions.map(q=>sv(c[q.id])).filter(v=>v>0);
      if(!vs.length)return;
      avg=vs.reduce((a,b)=>a+b,0)/vs.length;
    }
    num+=(avg-1)/4*(W[f.id]||20);den+=W[f.id]||20;
  });
  return den?Math.round((num/den)*100):0;
}
function calcSustainPenalty(psyAns){
  const p=so(psyAns),pw1=sv(p.pw1),pw2=sv(p.pw2);
  if(!pw1&&!pw2)return 1;
  if(pw2<=1&&pw1>=4)return SPEN_HIGH;
  if(pw2<=2)return SPEN_MED;
  return 1;
}
function calcFinalScore(stageId,ans={},coAns={},psyAns={},masterAns={},wstars=DEFAULT_WSTARS){
  const adh=calcAdh(so(ans),wstars);
  const co=calcCoScore_v10(so(coAns));
  const psy=calcPsyScore(so(psyAns));
  const master=calcMasterScore(so(masterAns));
  const parts=[];
  if(adh>0)parts.push({v:adh,w:28});
  if(co>0)parts.push({v:co,w:32});
  if(psy>0)parts.push({v:psy,w:22});
  if(master>0)parts.push({v:master,w:8});
  if(!parts.length)return 0;
  const totW=parts.reduce((s,p)=>s+p.w,0);
  const base=Math.round(parts.reduce((s,p)=>s+p.v*p.w,0)/totW);
  const sf={map:.88,apply:.90,hr1:.93,hr2:.96,mgr:.98,final:1.0,offer:1.0}[stageId]||.9;
  return Math.round(Math.min(97,base*sf*calcSustainPenalty(psyAns)));
}
function calcEV(stageId,ans,psyAns,wstars=DEFAULT_WSTARS){
  const a=so(ans),p=so(psyAns),prob=calcCandProb(stageId,a,wstars)/100;
  if(!prob)return 0;
  const carVs=FACTORS.find(f=>f.id==='car').questions.map(q=>sv(a[q.id])).filter(v=>v>0);
  const finVs=FACTORS.find(f=>f.id==='fin').questions.map(q=>sv(a[q.id])).filter(v=>v>0);
  const mktVs=FACTORS.find(f=>f.id==='mkt').questions.map(q=>sv(a[q.id])).filter(v=>v>0);
  const purVs=PSY_FACTORS.find(f=>f.id==='ps_purpose').questions.map(q=>sv(p[q.id])).filter(v=>v>0);
  if(!carVs.length&&!finVs.length&&!mktVs.length&&!purVs.length)return 0;
  const cv=savg(carVs,2.5)*0.40+savg(finVs,2.5)*0.30+savg(mktVs,2.5)*0.20+savg(purVs,2.5)*0.10;
  return Math.round(Math.min(98,prob*((cv-1)/4)*100));
}

function calcRPN(coAns,ans,psyAns){
  /* FMEA: RPN = Severidade × Ocorrência × Detecção (normalizado 0-100) */
  const c=so(coAns),a=so(ans),p=so(psyAns);
  const sev=Math.max(0,(5-sv(c.r1,3))*(5-sv(a.f3,3))/20);
  const occ=(sv(c.r2,3)<=2?1:0)+(sv(c.r3,3)<=2?1:0)+(sv(c.r4,3)<=2?1:0);
  const det=Math.max(0,(sv(p.sk4,3)+sv(p.pw3,3)+sv(c.d1,3))/3);
  const rpn=Math.round(((sev+occ/3)*(5-det)/4)*100/5);
  return Math.min(100,Math.max(0,rpn));
}

function calcDecay(co,nowMs=Date.now()){
  const d=sd(co.lastContactDate);
  if(!d||['no','done','standby'].includes(co.stage))return null;
  const days=Math.floor((nowMs-d.getTime())/86400000);
  if(days<DECAY_START)return null;
  const dec=Math.min(DECAY_MAX,(days-DECAY_START)*DECAY_PER_DAY);
  const base=calcFinalScore(co.stage,so(co.ans),so(co.coAns),so(co.psyAns),so(co.masterAns),co.wstars||DEFAULT_WSTARS);
  return{original:base,decayed:Math.round(base*(1-dec)),days,pct:Math.round(dec*100)};
}

function isFalsePos(fs,ev,rpn){return fs>=65&&ev<=25&&rpn>=45;}
function calcOppCost(coId,thisEV,all){

function buildExplain(co,{fs,ev,coSc,rpn,sustain,decay,falsePos,align,oppCost,discAlerts}){

/* ══════════════════════════════════════════════════════════════════════
   EXTENSION LAYERS — v8
   Adicionadas sobre v7 sem modificar nada existente.
   ══════════════════════════════════════════════════════════════════════

   ── CAMADA 1: VALIDAÇÃO ESTATÍSTICA ──
   Verifica probabilidades, normaliza se necessário, detecta correlações.
*/
function ValidationService(companies=[]){
  const warnings=[];
  companies.forEach(co=>{
    const fs=calcFinalScore(co.stage,co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{},co.wstars||DEFAULT_WSTARS);
    if(fs>97){warnings.push({id:co.id,msg:`${co.company}: score acima do teto (${fs}%) — revisar avaliações.`});}
    if(fs>0&&fs<5){warnings.push({id:co.id,msg:`${co.company}: score muito baixo (${fs}%) — dados insuficientes?`});}
    const fp=filled(co.ans||{});
    if(fp.pct<20&&Object.keys(co.ans||{}).length>0){
      warnings.push({id:co.id,msg:`${co.company}: avaliação incompleta (${fp.pct}%) — resultados imprecisos.`});
    }
  });
  /* Correlação: múltiplas oportunidades com scores idênticos */
  const scores=companies.map(co=>calcFinalScore(co.stage,co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{},co.wstars||DEFAULT_WSTARS)).filter(s=>s>0);
  const unique=new Set(scores);
  if(scores.length>2&&unique.size===1){
    warnings.push({id:'global',msg:'Todos os scores são idênticos — revise se as avaliações estão diferenciadas.'});
  }
  return warnings;
}

/* ── CAMADA 2: MONTE CARLO PROBABILÍSTICO ── 100k iterações ── */
function MonteCarloService(companies=[],iterations=100000){
  const active=companies.filter(c=>!['no','done','standby'].includes(c.stage));
  if(!active.length)return{p30:0,p60:0,p90:0,topOpp:null,confidence:'baixa'};

  let hits30=0,hits60=0,hits90=0;
  const scores=active.map(co=>{
    const fs=calcFinalScore(co.stage,co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{},co.wstars||DEFAULT_WSTARS);
    const acc=accuracyPct(co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{});
    const stageBoost={map:.3,apply:.5,hr1:.6,hr2:.7,mgr:.8,final:.9,offer:.97}[co.stage]||.5;
    return{id:co.id,p:Math.min(.95,(fs/100)*stageBoost),acc};
  });

  const avgAcc=scores.reduce((s,x)=>s+x.acc,0)/scores.length;
  const confidence=avgAcc>=85?'alta':avgAcc>=75?'média':'baixa';

  for(let i=0;i<iterations;i++){
    const r=Math.random();
    /* Cada oportunidade tem probabilidade independente — qualquer uma fecha = hit */
    const anyClose30=scores.some(s=>r<s.p*0.35);
    const anyClose60=scores.some(s=>r<s.p*0.65);
    const anyClose90=scores.some(s=>r<s.p*0.90);
    if(anyClose30)hits30++;
    if(anyClose60)hits60++;
    if(anyClose90)hits90++;
  }

  const topOpp=scores.sort((a,b)=>b.p-a.p)[0];
  return{
    p30:Math.min(95,Math.round(hits30/iterations*100)),
    p60:Math.min(95,Math.round(hits60/iterations*100)),
    p90:Math.min(97,Math.round(hits90/iterations*100)),
    topOpp:active.find(c=>c.id===topOpp?.id),
    confidence,
    iterations,
  };
}

/* ── CAMADA 3: PRIORIZAÇÃO INTELIGENTE ── */
function PriorityService(co){
  if(!co||co.stage==='standby')return{p:'monitoramento',c:'#6E5A9E',icon:'⏸'};
  const fs=calcFinalScore(co.stage,co.ans||{},co.coAns||{},co.psyAns||{},co.masterAns||{},co.wstars||DEFAULT_WSTARS);
  const stageScore={map:1,apply:2,hr1:3,hr2:4,mgr:5,final:6,offer:7}[co.stage]||1;
  const momentum=stageScore*10;
  const hasDecider=(co.coAns||{}).d1>=4||(co.coAns||{}).d2>=4;
  const composite=fs*.6+momentum*.2+(hasDecider?20:0);
  if(composite>=72)return{p:'alta',    c:'#00D47E',icon:'🔴'};
  if(composite>=48)return{p:'média',   c:'#FFB800',icon:'🟡'};
  if(composite>=25)return{p:'baixa',   c:'#FF9500',icon:'🟠'};
  return              {p:'monitoramento',c:'#555',icon:'⚫'};
}

/* ── CAMADA 4: PIPELINE_AUDIT ── */
function PipelineAudit(companies=[]){
  const now=Date.now();
  const alerts=[];

  companies.forEach(co=>{
    /* Oportunidades sem ação definida */
    if(!co.acao&&!['no','done'].includes(co.stage)){
      alerts.push({type:'warn',id:co.id,company:co.company,msg:'Sem próxima ação definida.'});
    }
    /* Standby sem revisão há 30 dias */
    if(co.stage==='standby'){
      const lastMoved=co.standbyDate?new Date(co.standbyDate).getTime():new Date(co.createdAt||now).getTime();
      const daysSince=Math.floor((now-lastMoved)/86400000);
      if(daysSince>=30){
        alerts.push({type:'reactivate',id:co.id,company:co.company,
          msg:`Standby há ${daysSince} dias — revisar ou reativar.`});
      }
    }
    /* Sem contato há 14 dias (ghosting) */
    if(co.lastContactDate&&!['no','done','standby'].includes(co.stage)){
      const daysSince=Math.floor((now-new Date(co.lastContactDate).getTime())/86400000);
      if(daysSince>=14){
        alerts.push({type:'ghost',id:co.id,company:co.company,
          msg:`Sem contato há ${daysSince} dias — risco de ghosting.`});
      }
    }
    /* Campos críticos faltantes */
    const fp=filled(co.ans||{});
    if(fp.pct===0&&!['no','done'].includes(co.stage)){
      alerts.push({type:'info',id:co.id,company:co.company,msg:'Avaliação não iniciada — sem dados para análise.'});
    }
  });

  /* Standby sem resposta há muito tempo */
  const staleStandby=companies.filter(co=>{
    if(co.stage!=='standby')return false;
    const d=co.standbyDate?new Date(co.standbyDate).getTime():new Date(co.createdAt||now).getTime();
    return Math.floor((now-d)/86400000)>=30;
  });

  return{alerts,staleStandby,totalIssues:alerts.length};
}

/* ── CAMADA 5: REPORT GENERATOR com fallback ── */
async function generateStrategicReport(promptText,maxTok=1900){
  /* Tenta gerar relatório completo — fallback automático se falhar */
  try{
    const r=await ai([{role:'user',content:promptText}],maxTok);
    if(!r||r.trim().length<50)throw new Error('Resposta vazia ou muito curta');

    try{
      const fallbackPrompt=`Gere um relatório estratégico resumido de carreira.
${promptText.slice(0,800)}
Máximo 300 palavras. Formato simples: diagnóstico, top oportunidade, próxima ação.`;

/* ─── QUALIFICAÇÃO DE VAGA/EMPRESA (CFI-v15.15) ─── */
function calcProfileMatch(co, profile){
  // Calcula match entre perfil do candidato e vaga
  // Retorna 0-100
  if(!profile)return 50;
  let score=50, factors=0;

  // Tipo de venda match (peso alto)
  if(co.tipoVenda&&profile.tipoVendaPerfil){
    const exact=co.tipoVenda===profile.tipoVendaPerfil;
    const compatible={
      'SaaS/Recorrente':['Híbrido'],
      'CAPEX':['Híbrido','Serviços'],
      'Serviços':['CAPEX','Híbrido'],
      'Híbrido':['SaaS/Recorrente','CAPEX','Serviços'],
    };
    if(exact){score+=20;}
    else if(compatible[profile.tipoVendaPerfil]?.includes(co.tipoVenda)){score+=12;}
    else{score-=10;}
    factors++;
  }

  // Ticket match (peso alto)
  if(co.ticket&&profile.ticketPerfil){
    if(co.ticket===profile.ticketPerfil){score+=15;}
    else{
      const tiers={'< 50k':1,'50k – 500k':2,'> 500k':3};
      const diff=Math.abs((tiers[co.ticket]||2)-(tiers[profile.ticketPerfil]||2));
      score+=diff===1?8:-5;
    }
    factors++;
  }

  // Setor match — alta transferibilidade entre setores complexos
  if(co.setor&&profile.setoresTransfer?.length>0){
    if(profile.setoresTransfer.includes(co.setor)){
      score+=18; // setores onde ja atuou
    } else {
      // Grupos de alta transferibilidade
      const groups=[
        ['MedTech','HealthTech','CAPEX Industrial'],
        ['SaaS Enterprise','LogTech','FinTech','HealthTech'],
        ['AgTech','LogTech','CAPEX Industrial'],
        ['FinTech','SaaS Enterprise','EdTech'],
      ];
      const hasTransfer=groups.some(g=>
        g.includes(co.setor)&&g.some(x=>profile.setoresTransfer?.includes(x))
      );
      score+=hasTransfer?10:0;
    }
    factors++;
  }

  // Mix hunter/farmer match
  if(co.mixHF&&profile.mixHFPerfil){
    if(co.mixHF===profile.mixHFPerfil){score+=10;}
    else{
      const hunterScore={'100% Hunter':5,'70/30':4,'50/50':3,'30/70':2,'100% Farmer':1};
      const diff=Math.abs((hunterScore[co.mixHF]||3)-(hunterScore[profile.mixHFPerfil]||3));
      score+=diff<=1?6:diff===2?2:-4;
    }
    factors++;
  }

  // Objetivo match
  if(co.objetivo&&profile.objetivoPerfil){
    score+=co.objetivo===profile.objetivoPerfil?8:2;
    factors++;
  }

  // Contrato match
  if(co.contrato&&profile.contratoPerfil){
    score+=co.contrato===profile.contratoPerfil?7:
      (profile.contratoPerfil==='Híbrido'||co.contrato==='Híbrido')?4:0;
    factors++;
  }

  return Math.max(0,Math.min(100,Math.round(score)));
}

function calcQualScore(co){
  // Scoring baseado nos novos campos de qualificação
  // Retorna 0-100, funciona como ajuste fino ao score principal
  let pts=0, max=0;

  // Tipo de contrato (peso 8)
  const ct={CLT:100,PJ:85,'Híbrido':80,Projeto:60,Equity:70}[co.contrato||'']||50;
  pts+=ct*0.08; max+=8;

  // Tipo de venda vs perfil executivo (peso 12)
  const tv={'SaaS/Recorrente':100,'CAPEX':90,'Híbrido':85,Serviços:70}[co.tipoVenda||'']||50;
  pts+=tv*0.12; max+=12;

  // Ticket médio (peso 10)
  const tk={'> 500k':100,'50k – 500k':85,'< 50k':55}[co.ticket||'']||50;
  pts+=tk*0.10; max+=10;

  // Objetivo da vaga (peso 10)
  const obj={'BDM – Abrir mercado':100,'GTM – Lançamento':95,'Hunter – Nova receita':90,'Farmer – Expansão':75,Gestão:70,Projetos:65}[co.objetivo||'']||50;
  pts+=obj*0.10; max+=10;

  // OTE vs mercado (peso 10)
  const ote={'> mercado':100,'= mercado':85,'50–100% mercado':65,'< 50% mercado':30}[co.ote||'']||50;
  pts+=ote*0.10; max+=10;

  // Pressão por meta (peso 6)
  const pm={Baixa:90,Média:75,Alta:55}[co.pressaoMeta||'']||70;
  pts+=pm*0.06; max+=6;

  // Estágio empresa (peso 8)
  const ee={'Estável/Madura':90,'Scale-up':85,Startup:75,Reestruturação:55,Recuperação:40}[co.estagioEmp||'']||65;
  pts+=ee*0.08; max+=8;

  // Maturidade comercial (peso 8)
  const mc={Madura:100,Estruturada:85,Inicial:60,Inexistente:35}[co.matComercial||'']||60;
  pts+=mc*0.08; max+=8;

  // Setor (peso 8) - setores de maior fit com perfil
  const st={MedTech:100,HealthTech:100,'SaaS Enterprise':95,'CAPEX Industrial':90,LogTech:85,AgTech:80,FinTech:80,EdTech:70,Outro:60}[co.setor||'']||65;
  pts+=st*0.08; max+=8;

  // Crescimento empresa (peso 7)
  const cr={'> 30% aa':100,'10–30% aa':85,'< 10% aa':60,Declinando:30}[co.crescimento||'']||60;
  pts+=cr*0.07; max+=7;

  // Estrutura pré-vendas (peso 7)
  const pv={'Inside Sales estruturado':100,'SDR interno':85,'SDR externo':75,'Sem SDR':50}[co.preVendas||'']||60;
  pts+=pv*0.07; max+=7;

  // Força marketing (peso 6)
  const mk={Alta:100,Média:75,Baixa:50}[co.marketing||'']||65;
  pts+=mk*0.06; max+=6;

  // Normalize: if no fields filled, return neutral 65
  if(max===0)return 65;
  return Math.round(pts);
}

function getApiKey(){

}
function saveApiKey(k){
  try{localStorage.setItem('cfi_apikey',k.trim());}catch{}

async function ai(messages,maxTok=1600){
  const key=getApiKey();
  if(!key)throw new Error('API Key nao configurada. Va em Perfil para configurar.');
  if(key.startsWith('sk-ant')){
    const r=await fetch('https://api.anthropic.com/v1/messages',{method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':key,
        'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:maxTok,messages})});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error?.message||'Anthropic '+r.status);
    return d.content?.find(b=>b.type==='text')?.text||'';
  }
  if(key.startsWith('AIza')){
    const txt=messages.map(m=>m.content).join(' ');
    const r=await fetch('https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key='+key,{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({contents:[{parts:[{text:txt}]}],generationConfig:{maxOutputTokens:maxTok}})});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error?.message||'Gemini '+r.status);
    return d.candidates?.[0]?.content?.parts?.[0]?.text||'';
  }
  if(key.startsWith('gsk_')){
    const r=await fetch('https://api.groq.com/openai/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'llama-3.3-70b-versatile',max_tokens:maxTok,messages})});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error?.message||'Groq '+r.status);
    return d.choices?.[0]?.message?.content||'';
  }
  if(key.startsWith('sk-')){
    const r=await fetch('https://api.openai.com/v1/chat/completions',{method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+key},
      body:JSON.stringify({model:'gpt-4o-mini',max_tokens:maxTok,messages})});
    const d=await r.json();
    if(!r.ok||d.error)throw new Error(d.error?.message||'OpenAI '+r.status);
    return d.choices?.[0]?.message?.content||'';
  }
  throw new Error('Formato nao reconhecido: sk-ant-... / AIza... (Gemini gratis) / gsk_... (Groq gratis) / sk-...');
}

function exportData(data){
  const b=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  const u=URL.createObjectURL(b);
  const a=document.createElement('a');
  a.href=u;a.download=`cfi-backup-${new Date().toISOString().slice(0,10)}.json`;a.click();
  URL.revokeObjectURL(u);

function importData(file,onOk,onErr){
  const reader=new FileReader();
  reader.onload=e=>{
    try{const d=JSON.parse(e.target.result);
      if(!d.profile)throw new Error('Invalid file');onOk(d);
    }catch(err){onErr(err.message);}
  };
  reader.readAsText(file);
}

          {steps.map((t,i)=>(
            <React.Fragment key={i}>
              <div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:5}}>
                <div style={{width:34,height:34,borderRadius:'50%',
                  background:step>=i?'var(--gold)':'var(--s3)',
                  border:`2px solid ${step>=i?'var(--gold)':'var(--border)'}`,
                  display:'flex',alignItems:'center',justifyContent:'center',
                  fontSize:14,fontWeight:700,color:step>=i?'#000':'var(--t3)',transition:'all .2s'}}>
                  {step>i?'✓':i+1}
                </div>
                <span style={{fontSize:10,color:step===i?'var(--gold)':'var(--t3)',fontWeight:700,letterSpacing:'.08em'}}>{t.toUpperCase()}</span>
              </div>
              {i<steps.length-1&&<div style={{width:44,height:2,background:step>i?'var(--gold)':'var(--border)',margin:'0 6px 20px',transition:'background .3s'}}/>}
            </React.Fragment>
          ))}
        </div>

        <Card sx={{padding:22}}>
          {step===0&&(
            <div className="fup">
              <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
                <Fld label="Nome Completo" req><input className="inp" value={f.name} onChange={e=>s('name',e.target.value)} placeholder="Seu nome"/></Fld>
                <Fld label="E-mail" req><input className="inp" type="email" value={f.email} onChange={e=>s('email',e.target.value)} placeholder="email@exemplo.com"/></Fld>
                <Fld label="Telefone"><input className="inp" value={f.phone} onChange={e=>s('phone',e.target.value)} placeholder="(00) 9 0000-0000"/></Fld>
                <Fld label="País"><input className="inp" value={f.country} onChange={e=>s('country',e.target.value)}/></Fld>
                <Fld label="Cidade"><input className="inp" value={f.city} onChange={e=>s('city',e.target.value)}/></Fld>
                <Fld label="Estado"><input className="inp" value={f.state} onChange={e=>s('state',e.target.value)}/></Fld>
                <Fld label="Cargo Pretendido"><input className="inp" value={f.role} onChange={e=>s('role',e.target.value)} placeholder="Ex: Diretor Comercial"/></Fld>
                <Fld label="Senioridade">
                  <select className="inp" value={f.seniority} onChange={e=>s('seniority',e.target.value)}>
                    <option value="">Selecione</option>
                    {['Júnior','Pleno','Sênior','Especialista','Coordenador','Gerente','Diretor','VP','C-Level'].map(x=><option key={x}>{x}</option>)}
                  </select>
                </Fld>
              </div>
              <Fld label="Área de Atuação"><input className="inp" value={f.area} onChange={e=>s('area',e.target.value)} placeholder="Ex: Comercial B2B, TI, Finanças..."/></Fld>
              <Fld label="Aprendizados de processos anteriores" hint="opcional">
                <textarea className="inp" value={f.pastLearnings} onChange={e=>s('pastLearnings',e.target.value)}
                  placeholder="Ex: Carestream — percebi tarde que não havia budget real. Resmedical — gestor resistente a perfil sênior..."/>
              </Fld>
              <button disabled={!f.name||!f.email} onClick={()=>setStep(1)}
                style={{width:'100%',padding:14,background:f.name&&f.email?'var(--gold)':'var(--s4)',
                  color:f.name&&f.email?'#000':'var(--t3)',border:'none',borderRadius:'var(--r)',
                  cursor:f.name&&f.email?'pointer':'not-allowed',fontWeight:700,fontSize:15}}>
                Continuar →
              </button>
            </div>
          )}
          {step===1&&(
            <div className="fup">
              <div style={{fontSize:15,fontWeight:700,marginBottom:4}}>🧠 Perfil DISC Hierárquico</div>
              <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.65,marginBottom:16}}>
                Ordene as dimensões do mais forte ao menos expressivo. O perfil composto (ex: D-I-C-S) define seu estilo comportamental dominante e como você reage sob pressão.
              </div>
              <DiscRankPicker value={f.discSeq} onChange={v=>s('discSeq',v)}/>
              {f.discSeq.length>0&&(
                <div style={{marginTop:14}}>
                  <Fld label="Perfil sob Estresse (DISC Sombra)" hint="opcional">
                    <textarea className="inp" value={f.discShadow} onChange={e=>s('discShadow',e.target.value)}
                      style={{minHeight:56}} placeholder="Como você costuma reagir em situações de alta pressão ou crise? Seja honesto."/>
                  </Fld>
                </div>
              )}
              <div style={{display:'flex',gap:10,marginTop:16}}>
                <button onClick={()=>setStep(0)} style={{padding:'11px 18px',background:'var(--s3)',
                  border:'1px solid var(--border)',borderRadius:'var(--r)',color:'var(--t2)',cursor:'pointer',fontWeight:600}}>← Voltar</button>
                <button onClick={()=>setStep(2)} style={{flex:1,padding:13,background:'var(--gold)',color:'#000',
                  border:'none',borderRadius:'var(--r)',cursor:'pointer',fontWeight:700,fontSize:15}}>
                  Continuar →
                </button>
              </div>
            </div>
          )}
          {step===2&&(
            <div className="fup">
              <div style={{fontSize:15,fontWeight:700,marginBottom:8}}>📄 Currículo</div>
              <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.7,marginBottom:16}}>
                Upload PDF/TXT. A IA extrai cargo, área, skills, <strong style={{color:'var(--gold)'}}>conquistas quantificadas</strong> e setores — alimenta todos os scorecards e análises.
              </div>
              <div style={{border:'2px dashed var(--border2)',borderRadius:'var(--rl)',
                padding:'24px',textAlign:'center',marginBottom:14,background:'var(--s3)'}}>
                {loading?<div style={{display:'flex',flexDirection:'column',alignItems:'center',gap:10}}>
                    <Spin sz={28}/><span style={{color:'var(--t2)',fontSize:13}}>Extraindo conquistas, setores e skills...</span>
                  </div>
                  :f.cvName?<div>
                    <div style={{fontSize:26,marginBottom:6}}>✅</div>
                    <div style={{color:'var(--green)',fontSize:14,fontWeight:700}}>{f.cvName}</div>
                    {f.achievements&&<div style={{fontSize:12,color:'var(--t2)',marginTop:6,lineHeight:1.5}}>{f.achievements}</div>}
                    <button onClick={()=>s('cvName','')} style={{marginTop:8,background:'none',border:'none',cursor:'pointer',color:'var(--t3)',fontSize:12,textDecoration:'underline'}}>remover</button>
                  </div>
                  :<>
                    <div style={{fontSize:36,marginBottom:10}}>📄</div>
                    <div style={{color:'var(--t2)',fontSize:13,marginBottom:14}}>PDF · TXT · DOCX</div>
                    <UpBtn label="Selecionar Arquivo" accept=".pdf,.txt,.doc,.docx" variant="gold" onFile={handleCV}/>
                  </>
                }
              </div>
              {err&&<div style={{padding:'9px 13px',background:'rgba(255,149,0,.1)',borderRadius:'var(--r)',
                fontSize:12,color:'var(--orange)',marginBottom:12}}>⚠ {err}</div>}
              <div style={{display:'flex',gap:10}}>
                <button onClick={()=>setStep(1)} style={{padding:'11px 18px',background:'var(--s3)',
                  border:'1px solid var(--border)',borderRadius:'var(--r)',color:'var(--t2)',cursor:'pointer',fontWeight:600}}>← Voltar</button>
                <button onClick={()=>onDone({profile:f,companies:[]})}
                  style={{flex:1,padding:13,background:'var(--gold)',color:'#000',border:'none',
                    borderRadius:'var(--r)',cursor:'pointer',fontWeight:700,fontSize:15}}>
                  {f.cvName?'Iniciar CFI →':'Pular e Iniciar →'}
                </button>
              </div>
            </div>
          )}
        </Card>
      </div>
    </div>);}

/* ════════════ OPP FORM ════════════ */
function OppForm({initial,onSave,onClose}){
  const [f,setF]=useState(initial||{
    id:Date.now(),company:'',role:'',city:'',state:'',country:'Brasil',
    link:'',stage:'apply',ans:{},coAns:{},psyAns:{},masterAns:{},
    wstars:{...DEFAULT_WSTARS},notes:'',
    jobDesc:'',jobDescName:'',finalists:null,
    lastContactDate:'',responsiveness:3,
    /* ── EXTENSÃO: STATUS e AÇÃO ── */
    status:'ativo', acao:'aguardar', standbyDate:null,
    color:['#FFB800','#0A84FF','#00D47E','#BF5AF2','#FF9500','#32ADE6'][Math.floor(Math.random()*6)],
    createdAt:new Date().toISOString(),
  });
  const [loading,setLoading]=useState(false);
  const set=(k,v)=>setF(p=>({...p,[k]:v}));

  async function fetchJobFromURL(){
    if(!f.link||!f.link.startsWith('http'))return;
    setLoading(true);
    try{
      /* Fetch via AI reading the URL content from context */
      const r=await ai([{role:'user',content:`Acesse e analise esta vaga. URL: ${f.link}
Não conseguindo acessar a URL diretamente, interprete o que for possível.
Responda APENAS JSON sem markdown:
{"company":"","role":"","city":"","state":"","jobDesc":"resumo da vaga em 3 linhas"}
Se não conseguir extrair, retorne campos vazios.`}],400);
      const d=JSON.parse(r.replace(/```[a-z]*/g,'').replace(/```/g,'').trim());
      if(d.company&&!f.company)set('company',d.company);
      if(d.role&&!f.role)set('role',d.role);
      if(d.city&&!f.city)set('city',d.city);
      if(d.state&&!f.state)set('state',d.state);
      if(d.jobDesc&&!f.jobDesc)set('jobDesc',d.jobDesc);
    }catch{}
    setLoading(false);
  }

  async function extractJob(){
    if(!f.jobDesc||f.jobDesc.length<30)return;
    setLoading(true);
    try{
      const r=await ai([{role:'user',content:`Extraia informações da vaga. Responda APENAS JSON sem markdown:
{"company":"","role":"","city":"","state":"","keyRequirements":"3 requisitos principais separados por vírgula","level":"senioridade exigida"}
Texto:\n${f.jobDesc.slice(0,2000)}`}],400);
      const d=JSON.parse(r.replace(/```[a-z]*/g,'').replace(/```/g,'').trim());
      if(d.company&&!f.company)set('company',d.company);
      if(d.role&&!f.role)set('role',d.role);
      if(d.city&&!f.city)set('city',d.city);
      if(d.state&&!f.state)set('state',d.state);
    }catch{}
    setLoading(false);
  }

  return(
    <div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Fld label="Company" req><input className="inp" value={f.company} onChange={e=>set('company',e.target.value)} placeholder="Company name"/></Fld>
        <Fld label="Role / Position" req><input className="inp" value={f.role} onChange={e=>set('role',e.target.value)} placeholder="Ex: Commercial Director LATAM"/></Fld>
        <Fld label="City"><input className="inp" value={f.city} onChange={e=>set('city',e.target.value)}/></Fld>
        <Fld label="State"><input className="inp" value={f.state} onChange={e=>set('state',e.target.value)}/></Fld>
      </div>
      <Fld label="Link da Vaga">
        <div style={{display:'flex',gap:8}}>
          <input className="inp" type="url" value={f.link} onChange={e=>set('link',e.target.value)} placeholder="https://..."/>
          {f.link&&f.link.startsWith('http')&&(
            <button onClick={fetchJobFromURL} disabled={loading}
              style={{padding:'0 14px',background:'var(--gd)',border:'1.5px solid #FFB80044',
                borderRadius:'var(--r)',color:'var(--gold)',cursor:'pointer',fontSize:12,
                fontWeight:700,whiteSpace:'nowrap',flexShrink:0}}>
              {loading?<Spin sz={14}/>:'✦ AI'}
            </button>
          )}
        </div>
      </Fld>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Fld label="Current Stage">
          <select className="inp" value={f.stage} onChange={e=>set('stage',e.target.value)}>
            {PIPE.map(s=><option key={s.id} value={s.id}>{s.icon} {s.label}</option>)}
          </select>
        </Fld>
        <Fld label="Finalistas restantes" hint="opcional">
          <input className="inp" type="number" min="1" max="50" value={f.finalists||''} placeholder="Ex: 3"
            onChange={e=>set('finalists',e.target.value?parseInt(e.target.value):null)}/>
        </Fld>
      </div>
      <Sep/>
      <Lbl mb={8}>Descrição da Vaga (calibra IA)</Lbl>
      <div style={{display:'flex',gap:8,marginBottom:10,flexWrap:'wrap'}}>
        <UpBtn label={f.jobDescName||'Upload PDF/TXT'} accept=".pdf,.txt,.doc,.docx"
          variant={f.jobDescName?'outline':'ghost'}
          onFile={file=>{const r=new FileReader();r.onload=e=>{set('jobDescName',file.name);set('jobDesc',e.target.result.slice(0,4000));};r.readAsText(file);}}/>
        {f.jobDesc&&(
          <button onClick={extractJob} disabled={loading}
            style={{display:'inline-flex',alignItems:'center',gap:6,padding:'8px 14px',
              background:'var(--gd)',border:'1.5px solid #FFB80044',borderRadius:'var(--r)',
              color:'var(--gold)',cursor:'pointer',fontSize:13,fontWeight:700}}>
            {loading?<Spin sz={14}/>:'✦'} Extract with AI
          </button>
        )}
      </div>
      <textarea className="inp" value={f.jobDesc} onChange={e=>set('jobDesc',e.target.value)}
        placeholder="Cole a descrição da vaga ou faça upload..." style={{fontSize:13,minHeight:70}}/>
      <Sep/>
      {/* ── EXTENSÃO: STATUS · AÇÃO · CONTATO ── */}
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:'0 12px'}}>
        <Fld label="Status">
          <select className="inp" value={f.status||'ativo'} onChange={e=>{
            const v=e.target.value;
            set('status',v);
            if(v==='standby'&&f.stage!=='standby'){set('stage','standby');set('standbyDate',new Date().toISOString());}
          }}>
            {STATUS_OPTIONS.map(s=><option key={s} value={s}>{s}</option>)}
          </select>
        </Fld>
        <Fld label="Próxima Ação">
          <select className="inp" value={f.acao||'aguardar'} onChange={e=>set('acao',e.target.value)}>
            {ACAO_OPTIONS.map(a=><option key={a} value={a}>{a}</option>)}
          </select>
        </Fld>
        <Fld label="Último Contato" hint="opcional">
          <input className="inp" type="date" value={f.lastContactDate||''}
            onChange={e=>set('lastContactDate',e.target.value)}/>
        </Fld>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 2fr',gap:'0 12px',marginTop:4}}>
        <Fld label="Data Próx. Ação" hint="countdown auto">
          <input className="inp" type="date" value={f.nextActionDate||''} onChange={e=>set('nextActionDate',e.target.value)}/>
        </Fld>
        <Fld label="Nota da Ação" hint="max 80 chars">
          <input className="inp" placeholder="Ex: Enviar 1-pager ao diretor" value={f.nextActionNote||''} onChange={e=>set('nextActionNote',e.target.value.slice(0,80))} maxLength={80}/>
        </Fld>
      </div>
      <Sep/>
      <Fld label="Notes / Próximos passos">
        <textarea className="inp" value={f.notes} onChange={e=>set('notes',e.target.value)}
          placeholder="Contatos, observações, próximos passos..." style={{minHeight:56}}/>
      </Fld>
      {/* ── Qualificação da Vaga ── */}
      <div style={{marginTop:16,marginBottom:6,fontSize:12,fontWeight:700,color:'var(--gold)',letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'}}>Qualificação da Vaga</div>

      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Fld label="Tipo de Contrato">
          <select className="inp" value={f.contrato||''} onChange={e=>set('contrato',e.target.value)}>
            <option value="">Selecione</option>
            {['CLT','PJ','Projeto','Equity','Híbrido'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Tipo de Venda">
          <select className="inp" value={f.tipoVenda||''} onChange={e=>set('tipoVenda',e.target.value)}>
            <option value="">Selecione</option>
            {['SaaS/Recorrente','CAPEX','Serviços','Híbrido'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Ticket Médio">
          <select className="inp" value={f.ticket||''} onChange={e=>set('ticket',e.target.value)}>
            <option value="">Selecione</option>
            {['< 50k','50k – 500k','> 500k'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Ciclo de Vendas">
          <select className="inp" value={f.ciclo||''} onChange={e=>set('ciclo',e.target.value)}>
            <option value="">Selecione</option>
            {['0–90 dias','90–180 dias','6–18 meses','18+ meses'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Objetivo da Vaga">
          <select className="inp" value={f.objetivo||''} onChange={e=>set('objetivo',e.target.value)}>
            <option value="">Selecione</option>
            {['BDM – Abrir mercado','GTM – Lançamento','Hunter – Nova receita','Farmer – Expansão','Gestão','Projetos'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Mix Hunter/Farmer">
          <select className="inp" value={f.mixHF||''} onChange={e=>set('mixHF',e.target.value)}>
            <option value="">Selecione</option>
            {['100% Hunter','70/30','50/50','30/70','100% Farmer'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="OTE vs Mercado">
          <select className="inp" value={f.ote||''} onChange={e=>set('ote',e.target.value)}>
            <option value="">Selecione</option>
            {['< 50% mercado','50–100% mercado','= mercado','> mercado'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Pressão por Meta">
          <select className="inp" value={f.pressaoMeta||''} onChange={e=>set('pressaoMeta',e.target.value)}>
            <option value="">Selecione</option>
            {['Baixa','Média','Alta'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
      </div>

      <div style={{marginTop:14,marginBottom:6,fontSize:12,fontWeight:700,color:'#0A84FF',letterSpacing:'.1em',textTransform:'uppercase',fontFamily:'var(--mono)'}}>Qualificação da Empresa</div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'0 12px'}}>
        <Fld label="Nº Funcionários">
          <select className="inp" value={f.numFunc||''} onChange={e=>set('numFunc',e.target.value)}>

            {['1–50','50–200','200–1000','1000+'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Tipo">
          <select className="inp" value={f.tipoEmp||''} onChange={e=>set('tipoEmp',e.target.value)}>

            {['Nacional','Multinacional','Startup','Scale-up'].map(x=><option key={x}>{x}</option>)}

        <Fld label="Estágio">
          <select className="inp" value={f.estagioEmp||''} onChange={e=>set('estagioEmp',e.target.value)}>

            {['Startup','Scale-up','Reestruturação','Recuperação','Estável/Madura'].map(x=><option key={x}>{x}</option>)}

            {['MedTech','HealthTech','SaaS Enterprise','CAPEX Industrial','LogTech','AgTech','FinTech','EdTech','Outro'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Crescimento da Empresa">
          <select className="inp" value={f.crescimento||''} onChange={e=>set('crescimento',e.target.value)}>
            <option value="">Selecione</option>
            {['< 10% aa','10–30% aa','> 30% aa','Declinando'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Estrutura Pré-vendas">
          <select className="inp" value={f.preVendas||''} onChange={e=>set('preVendas',e.target.value)}>
            <option value="">Selecione</option>
            {['Sem SDR','SDR interno','SDR externo','Inside Sales estruturado'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
        <Fld label="Força de Marketing">
          <select className="inp" value={f.marketing||''} onChange={e=>set('marketing',e.target.value)}>
            <option value="">Selecione</option>
            {['Baixa','Média','Alta'].map(x=><option key={x}>{x}</option>)}
          </select>
        </Fld>
      </div>

      <div style={{display:'flex',gap:10,marginTop:8}}>
        <button onClick={onClose} style={{padding:'11px 18px',background:'var(--s3)',
          border:'1px solid var(--border)',borderRadius:'var(--r)',color:'var(--t2)',cursor:'pointer',fontWeight:600}}>Cancel</button>
        <button disabled={!f.company||!f.role}
          onClick={()=>{if(f.company&&f.role)onSave(f);}}
          style={{flex:1,padding:13,background:f.company&&f.role?'var(--gold)':'var(--s4)',
            color:f.company&&f.role?'#000':'var(--t3)',border:'none',
            borderRadius:'var(--r)',cursor:f.company&&f.role?'pointer':'not-allowed',
            fontWeight:700,fontSize:15}}>
          {initial?'Save Changes':'Create Opportunity →'}
        </button>
      </div>
    </div>);}

/* ════════════ MASTER QUESTIONS (5 binárias) ════════════ */
function MasterPanel({masterAns={},onChange}){
  const score=calcMasterScore(masterAns);
  const answered=MASTER_Q.filter(q=>masterAns[q.id]!==undefined).length;
  const ml=masterLabel(masterAns);

  return(
    <div>
      <Card sx={{padding:'16px 20px',marginBottom:16,
        background:'linear-gradient(135deg,rgba(255,184,0,.06),var(--s2))',
        border:'1px solid #FFB80044'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',flexWrap:'wrap',gap:10}}>
          <div>
            <Lbl c="var(--gold)" mb={4}>❓ 5 Master Questions — Gut-Check Decisório</Lbl>
            <div style={{fontSize:12,color:'var(--t2)',lineHeight:1.6}}>
              Respostas instintivas honestas. Cada resposta modula o score final com peso ~8%.<br/>
              <span style={{color:'var(--t3)'}}>Nenhuma resposta elimina a vaga — só calibra a precisão.</span>
            </div>

/* ════════════ AI PANEL ════════════ */
function AIPanel({company,profile}){
  const [res,setRes]=useState('');
  const [loading,setLoading]=useState(false);
  const [err,setErr]=useState('');
  const a=calcAdh(company.ans||{},company.wstars||DEFAULT_WSTARS);
  const co=calcCoScore(company.coAns||{});
  const ps=calcPsyScore(company.psyAns||{});
  const ms=calcMasterScore(company.masterAns||{});
  const fs=calcFinalScore(company.stage,company.ans||{},company.coAns||{},company.psyAns||{},company.masterAns||{},company.wstars||DEFAULT_WSTARS);
  const fp=filled(company.ans||{});
  const fpc=filledCo(company.coAns||{});
  const fpp=filledPsy(company.psyAns||{});
  const acc=accuracyPct(company.ans||{},company.coAns||{},company.psyAns||{},company.masterAns||{});
  const stage=PIPE.find(s=>s.id===company.stage);
  const discStr=profile.discSeq?.length?`${profile.discSeq.join('-')} — ${discInterpret(profile.discSeq)}`:'Não informado';

  async function run(){
    setLoading(true);setRes('');setErr('');
    const candSum=FACTORS.map(f=>{
      const vs=f.questions.map(q=>({s:company.ans?.[q.id]||0})).filter(v=>v.s>0);
      const avg=vs.length?vs.reduce((x,v)=>x+v.s,0)/vs.length:0;
      return `${f.label}:${avg>0?avg.toFixed(1)+'/5':'n/a'}`;
    }).join(' | ');
    const coSum=CO_FACTORS.map(f=>{
      const vs=f.questions.map(q=>({s:company.coAns?.[q.id]||0})).filter(v=>v.s>0);
      const avg=vs.length?vs.reduce((x,v)=>x+v.s,0)/vs.length:0;
      return `${f.label}:${avg>0?avg.toFixed(1)+'/5':'n/a'}`;
    }).join(' | ');
    const psySum=PSY_FACTORS.map(f=>{
      const vs=f.questions.map(q=>({s:company.psyAns?.[q.id]||0})).filter(v=>v.s>0);
      const avg=vs.length?vs.reduce((x,v)=>x+v.s,0)/vs.length:0;
      return `${f.label}:${avg>0?avg.toFixed(1)+'/5':'n/a'}`;
    }).join(' | ');
    const masterSum=MASTER_Q.map(q=>{
      const v=company.masterAns?.[q.id];
      const opt=MASTER_OPTIONS.find(o=>o.val===v);
      return `${q.label.split('?')[0]}:${opt?opt.label:'n/a'}`;
    }).join(' | ');

    const prompt=`Você é 5 especialistas de elite com VISÃO TRILATERAL — candidato, empresa E psicologia da decisão.
SCORE FINAL: ${fs}% | Acurácia do modelo: ${acc}% (${fp.pct}% cand · ${fpc.pct}% empresa · ${fpp.pct}% psi preenchidos)

═══ CANDIDATO ═══
${profile.name} | ${profile.role||'Executivo'} | ${profile.seniority||'Sênior'}
Área: ${profile.area||'—'} | Skills: ${profile.skills||'—'}
Conquistas quantificadas: ${profile.achievements||'não extraídas'}
Setores de experiência: ${profile.sectors||'—'}
DISC Hierárquico: ${discStr}
DISC Sombra (stress): ${profile.discShadow||'não informado'}
Aprendizados anteriores: ${profile.pastLearnings||'—'}
${profile.cvText?'Trecho CV: '+profile.cvText.slice(0,300):''}

═══ OPORTUNIDADE ═══
${company.company} | ${company.role} | Estágio: ${stage?.label}
Local: ${[company.city,company.state].filter(Boolean).join(', ')||'—'}
Finalistas: ${company.finalists||'não informado'}
${company.jobDesc?'Vaga: '+company.jobDesc.slice(0,300):''}

═══ TRIPLE DECISION MATRIX ═══
CANDIDATO (${fp.pct}%): Fit ${a}% | ${candSum}
EMPRESA/RH (${fpc.pct}%): Score ${co}% | ${coSum}
PSICOLOGIA (${fpp.pct}%): Score ${ps}% | ${psySum}
GUT-CHECK: ${ms}% | ${masterSum}

SCORE FINAL BILATERAL: ${fs}% (${finalLabel(fs).t})

═══ 5 ESPECIALISTAS — VISÃO TRILATERAL ═══

[CONSULTOR DE RH SÊNIOR]
O que o Triple Matrix revela sobre a real intenção da empresa? Quais sinais do Power Map e processo precisam ser movidos nas próximas 72h? O que o candidato está deixando de ver?

[DESENVOLVEDOR DE PRODUTO APPLE]
Product-market fit bilateral: as 3 matrizes são coerentes entre si? Onde há o maior gap — e qual "feature" do candidato resolve? É um portfólio de qualidade ou um lançamento precipitado?

[EXECUTIVO DANAHER]
Dado ${fs}%: plano executivo em 30 dias. Quais KPIs das matrizes (empresa + psicologia) precisam subir agora? O que um top performer faria diferente esta semana?

[MATEMÁTICO ESTATÍSTICO PHD]
Critique a acurácia de ${acc}% e o score ${fs}%. O modelo é coerente com os dados? Análise Bayesiana do estágio atual. Quais variáveis têm maior peso preditivo real? Cenário pessimista/realista/otimista com intervalos de confiança.

[CEO FOUNDER GLOBAL]
Oportunidade de plataforma ou de serviço? O DISC ${profile.discSeq?.join('-')||'?'} é compatível com o que a empresa realmente precisa? O que você negociaria agressivamente? Veredicto de fechamento em 1 frase.

Máximo 650 palavras. Direto, específico, sem repetir dados.`;

    try{
      const r=await ai([{role:'user',content:prompt}],1800);
      setRes(r);
    }catch(e){setErr(`Erro: ${e.message}`);}
    setLoading(false);
  }

  const fl=finalLabel(fs);
  return(
    <div className="fup">
      {/* Score summary */}
      <Card sx={{padding:'18px 22px',marginBottom:14,glow:fs>0,gc:fl.c}}>
        <Lbl mb={12}>⚡ Triple Decision Matrix — Score Final</Lbl>
        <div style={{display:'grid',gridTemplateColumns:'repeat(2,1fr)',gap:10,marginBottom:14}}>
          {[
            {l:'Candidato',v:a+'%',c:a>0?'#FFB800':'var(--t4)'},
            {l:'Empresa',  v:co+'%',c:co>0?coLabel(co).c:'var(--t4)'},

        <div style={{fontSize:13,color:'var(--t2)',lineHeight:1.7,marginBottom:14}}>
          5 especialistas com visão trilateral: candidato + empresa + psicologia. DISC hierárquico + conquistas do CV + sombra + aprendizados anteriores.

            display:'flex',alignItems:'center',justifyContent:'center',gap:10}}>
          {loading?<><Spin sz={18}/><span>Consulting 5 specialists...</span></>

      {err&&<Card sx={{padding:'14px 18px',border:'1px solid #FF3B3044',marginBottom:14}}>

      {res&&(
        <Card className="fin" sx={{padding:24,borderLeft:'3px solid var(--gold)'}}>
          <Lbl c="var(--gold)" mb={14}>

          <div style={{fontSize:14,color:'var(--t1)',lineHeight:1.9}}>
            {res.split('\n').map((line,i)=>{

                  {line||'\u00A0'}
                </div>);})}
          </div>
        </Card>
      )}
    </div>);}

/* ════════════ DETAIL VIEW — 5 subtabs ════════════ */
function DetailView({company,onUpdate,onBack,profile}){
  const [sub,setSub]=useState('eval');
  const [editing,setEditing]=useState(false);
  const a=calcAdh(company.ans||{},company.wstars||DEFAULT_WSTARS);
  const co=calcCoScore(company.coAns||{});
  const ps=calcPsyScore(company.psyAns||{});
  const fs=calcFinalScore(company.stage,company.ans||{},company.coAns||{},company.psyAns||{},company.masterAns||{},company.wstars||DEFAULT_WSTARS);
  const acc=accuracyPct(company.ans||{},company.coAns||{},company.psyAns||{},company.masterAns||{});
  const fp=filled(company.ans||{});
  const stage=PIPE.find(s=>s.id===company.stage);
  const fl=finalLabel(fs);
  const qs=calcQualScore(company);
  const pm=calcProfileMatch(company,profile);
  const combined=Math.round(fs*0.65+qs*0.20+pm*0.15);
  const fitLbl=calcFitLabel(combined,qs);

  return(
    <div className="fup">
      <button onClick={onBack} style={{background:'none',border:'none',cursor:'pointer',
        color:'var(--t2)',fontSize:14,marginBottom:16,display:'flex',
        alignItems:'center',gap:6,padding:0,fontWeight:600}}>← Back</button>

        flexWrap:'wrap',gap:12,marginBottom:18}}>
        <div style={{flex:1,minWidth:200}}>
          <div style={{fontSize:26,fontWeight:900,letterSpacing:'-0.5px',marginBottom:4}}>{company.company}</div>
          <div style={{fontFamily:'var(--mono)',fontSize:13,color:'var(--t2)',marginBottom:10}}>{company.role}</div>
          <div style={{display:'flex',gap:7,flexWrap:'wrap'}}>
            <Tag label={`${stage?.icon} ${stage?.label}`} color={stage?.color||'var(--t3)'}/>
            {a>0&&<Tag label={`Fit ${a}%`} color={adhLabel(a).c}/>}
            {fs>0&&<Tag label={`⚡${fs}%`} color={fl.c}/>}
            {acc>72&&<Tag label={`~${acc}% acc`} color="var(--t3)" sm/>}
            {company.city&&<Tag label={`📍 ${company.city}`} color="var(--t2)"/>}
          </div>
        </div>
        <div style={{display:'flex',gap:8,flexShrink:0}}>
          {company.link&&<a href={company.link} target="_blank" rel="noreferrer"
            style={{padding:'8px 14px',background:'var(--s3)',border:'1px solid var(--border)',
              borderRadius:'var(--r)',color:'var(--blue)',textDecoration:'none',fontSize:13,fontWeight:700}}>
            🔗 View Job</a>}
          <button onClick={()=>setEditing(true)}
            style={{padding:'8px 14px',background:'var(--s3)',border:'1px solid var(--border)',
              borderRadius:'var(--r)',color:'var(--t1)',cursor:'pointer',fontSize:13,fontWeight:700}}>
            ✏ Edit</button>
        </div>
      </div>

      {fp.pct>0&&(
        <div style={{display:'flex',gap:10,marginBottom:12,flexWrap:'wrap',alignItems:'flex-start'}}>{(()=>{
          const nowMs=Date.now();
          const evV=calcEV(company.stage,company.ans||{},company.psyAns||{},company.wstars||DEFAULT_WSTARS);
          const rpnV=calcRPN(so(company.coAns),so(company.ans),so(company.psyAns));
          const decV=calcDecay(company,nowMs);
          const displayFS=decV?decV.decayed:fs;
          const displayColor=decV?'#FF3B30':fl.c;
          const rL=rpnLabel(rpnV);
          return(<>
            {fs>0&&<Ring pct={displayFS} color={displayColor} label={decV?'⚡Decay':'⚡Final'} sz={78} bold/>}
            {evV>0&&<Ring pct={evV} color={evLabel(evV).c} label="EV" sz={70}/>}
            {rpnV>0&&<Ring pct={100-rpnV} color={rL.c} label="RPN inv" sz={65}/>}
            {a>0&&<Ring pct={a} color={adhLabel(a).c} label="Candidato" sz={62}/>}
            {co>0&&<Ring pct={co} color={coLabel(co).c} label="Empresa" sz={62}/>}
            {ps>0&&<Ring pct={ps} color={psyLabel(ps).c} label="Decisão" sz={62}/>}
          </>);
        })()}</div>
      )}

      {/* 6 subtabs v10 DSS */}
      <div style={{display:'flex',gap:3,marginBottom:16,background:'var(--s2)',
        borderRadius:'var(--rl)',padding:4,border:'1px solid var(--border)',overflowX:'auto'}}>
        {[
          {k:'eval',   l:'⭐ Candidato'},
          {k:'company',l:'🏛 Empresa'},
          {k:'psy',    l:'🧠 Decisão'},
          {k:'master', l:'❓ Masters'},
          {k:'intel',  l:'⚡ Intel DSS'},
          {k:'ai',     l:'✦ AI'},
        ].map(t=>(
          <button key={t.k} onClick={()=>setSub(t.k)}
            style={{flex:1,minWidth:72,padding:'9px 5px',background:sub===t.k?'var(--s4)':'none',
              border:`1px solid ${sub===t.k?'var(--border2)':'transparent'}`,
              borderRadius:'var(--r)',cursor:'pointer',
              color:sub===t.k?'var(--text)':'var(--t2)',
              fontSize:11,fontWeight:sub===t.k?800:500,whiteSpace:'nowrap',
              transition:'all .15s'}}>
            {t.l}
          </button>
        ))}
      </div>

      {sub==='eval'&&<QuickEval ans={company.ans||{}} onChange={ans=>onUpdate({...company,ans})}
        wstars={company.wstars||DEFAULT_WSTARS} onWstars={wstars=>onUpdate({...company,wstars})}/>}
      {sub==='company'&&<CompanyScorecard coAns={company.coAns||{}} onChange={coAns=>onUpdate({...company,coAns})}/>}
      {sub==='psy'&&<PsychPanel psyAns={company.psyAns||{}} onChange={psyAns=>onUpdate({...company,psyAns})}/>}
      {sub==='master'&&<MasterPanel masterAns={company.masterAns||{}} onChange={masterAns=>onUpdate({...company,masterAns})}/>}
      {sub==='intel'&&<IntelTab company={company} profile={profile} all={[]}/>}
      {sub==='ai'&&<AIPanel company={company} profile={profile}/>}

      {editing&&(
        <Modal title={`✏ Edit · ${company.company}`} onClose={()=>setEditing(false)} wide>
          <OppForm initial={company} onSave={d=>{onUpdate(d);setEditing(false);}} onClose={()=>setEditing(false)}/>
        </Modal>
      )}
    </div>);}

/* ════════════ DASHBOARD ════════════ */
function Dashboard({companies,profile,nav,onAdd}){
  const active=companies.filter(c=>!['no','done'].includes(c.stage));
  const scored=companies.filter(c=>Object.keys(c.ans||{}).length>=3);
  const avgA=scored.length?Math.round(scored.reduce((s,c)=>s+calcAdh(c.ans,c.wstars||DEFAULT_WSTARS),0)/scored.length):0;
  const avgF=scored.length?Math.round(scored.reduce((s,c)=>s+calcFinalScore(c.stage,c.ans||{},c.coAns||{},c.psyAns||{},c.masterAns||{},c.wstars||DEFAULT_WSTARS),0)/scored.length):0;
  const ranked=[...scored].sort((a,b)=>{
    return calcFinalScore(b.stage,b.ans||{},b.coAns||{},b.psyAns||{},b.masterAns||{},b.wstars||DEFAULT_WSTARS)
          -calcFinalScore(a.stage,a.ans||{},a.coAns||{},a.psyAns||{},a.masterAns||{},a.wstars||DEFAULT_WSTARS);
  });
  const funnel=APIPE.map(s=>({...s,cnt:companies.filter(c=>c.stage===s.id).length}));

  return(
    <div className="fup">
      <div style={{marginBottom:24}}>
        <div style={{fontSize:30,fontWeight:900,letterSpacing:'-1px',marginBottom:3}}>
          {profile.name.split(' ')[0]} 👋
        </div>
        <div style={{color:'var(--t2)',fontSize:14,marginBottom:6}}>
          {profile.role&&`${profile.role} · `}{new Date().toLocaleDateString('pt-BR',{weekday:'long',day:'numeric',month:'long'})}
        </div>
        {profile.discSeq?.length>0&&(
          <div style={{display:'flex',gap:6,alignItems:'center',flexWrap:'wrap'}}>
            {profile.discSeq.map((id,i)=>{
              const d=DISC_DIM.find(x=>x.id===id);
              return <Tag key={id} label={`${i+1}°${id}`} color={d?.color||'var(--t3)'} sm/>;
            })}
            <span style={{fontSize:11,color:'var(--t3)'}}>DISC</span>
          </div>
        )}
      </div>

      {/* v10 DSS Alerts */}
      {(()=>{
        const nowMs=Date.now();
        const alerts=companies.filter(c=>!['no','done'].includes(c.stage)).reduce((acc,co)=>{
          const fs=calcFinalScore(co.stage,so(co.ans),so(co.coAns),so(co.psyAns),so(co.masterAns),co.wstars||DEFAULT_WSTARS);
          const ev=calcEV(co.stage,so(co.ans),so(co.psyAns),co.wstars||DEFAULT_WSTARS);
          const rpn=calcRPN(so(co.coAns),so(co.ans),so(co.psyAns));
          const decay=calcDecay(co,nowMs);
          if(decay&&decay.pct>=20)acc.push({co:co.company,m:`Score caiu ${decay.pct}% por falta de contato (${decay.days} dias sem resposta). Faça follow-up hoje.`,col:'#FF3B30'});
          if(isFalsePos(fs,ev,rpn))acc.push({co:co.company,m:`Atenção: probabilidade de fechar é alta, mas valor de carreira é baixo. Pode ser uma armadilha.`,col:'#FFB800'});
          if(calcAlignment(so(co.coAns),so(co.psyAns)).t==='Risco duplo ⚠')acc.push({co:co.company,m:'Gestor desalinhado e crença no produto baixa. Alto risco de insatisfação após contratação.',col:'#FF9500'});
          if(rpn>=70)acc.push({co:co.company,m:`Risco oculto detectado (${rpn}/100): processo tem sinais negativos sérios. Investigue antes de avançar.`,col:'#FF3B30'});
          return acc;
        },[]);
        if(!alerts.length)return null;
        return(<Card sx={{padding:'12px 16px',marginBottom:16,border:'1px solid #FF950033',background:'rgba(255,149,0,.03)'}}>
          <Lbl c="var(--orange)" mb={8}>⚠ DSS Alerts v10 — {alerts.length} item{alerts.length!==1?'s':''}</Lbl>
          {alerts.map((a,i)=>(<div key={i} style={{fontSize:12,color:'var(--t2)',display:'flex',gap:8,paddingTop:i?4:0}}>
            <span style={{color:a.col,flexShrink:0}}>●</span>
            <span><strong style={{color:'var(--t1)'}}>{a.co}:</strong> {a.m}</span>
          </div>))}
        </Card>);
      })()}
      {(()=>{
          const nowMs=Date.now();
          const avgEV=scored.length?Math.round(scored.reduce((s,co)=>s+calcEV(co.stage,so(co.ans),so(co.psyAns),co.wstars||DEFAULT_WSTARS),0)/scored.length):0;
          const avgRPN=scored.length?Math.round(scored.reduce((s,co)=>s+calcRPN(so(co.coAns),so(co.ans),so(co.psyAns)),0)/scored.length):0;
          const kpis=[
            {l:'Total',v:companies.length,pct:Math.min(100,companies.length/10*100),c:'#0A84FF',raw:true},
            {l:'Ativos',v:active.length,pct:Math.min(100,active.length/10*100),c:'#FFB800',raw:true},
            {l:'Score',v:avgF+'%',pct:avgF,c:avgF>=70?'#00D47E':avgF>=45?'#FFB800':'#FF3B30'},
            {l:'EV',v:avgEV+'%',pct:avgEV,c:avgEV>=70?'#00D47E':avgEV>=45?'#FFB800':'#FF3B30'},
            {l:'RPN',v:avgRPN,pct:Math.min(100,avgRPN),c:avgRPN>=70?'#FF3B30':avgRPN>=45?'#FF9500':'#00D47E',raw:true},
          ];
          const SZ=72;
          return(
            <div style={{display:'flex',justifyContent:'space-around',alignItems:'center',
              background:'var(--s2)',border:'1px solid var(--border)',borderRadius:'var(--rl)',
              padding:'16px 8px',marginBottom:20,flexWrap:'wrap',gap:8}}>
              {kpis.map(k=>(
                <div key={k.l} style={{display:'flex',flexDirection:'column',alignItems:'center',gap:6,minWidth:56}}>
                  <div style={{position:'relative',width:SZ,height:SZ}}>
                    <svg width={SZ} height={SZ} style={{transform:'rotate(-90deg)'}}>
                      <circle cx={SZ/2} cy={SZ/2} r={SZ/2-5} fill="none" stroke="var(--s4)" strokeWidth={5}/>
                      <circle cx={SZ/2} cy={SZ/2} r={SZ/2-5} fill="none" stroke={k.c} strokeWidth={5}
                        strokeDasharray={`${(k.pct/100)*(2*Math.PI*(SZ/2-5))} ${2*Math.PI*(SZ/2-5)}`}
                        strokeLinecap="round"/>
                    </svg>
                    <div style={{position:'absolute',top:0,left:0,width:'100%',height:'100%',
                      display:'flex',alignItems:'center',justifyContent:'center',
                      fontFamily:'var(--mono)',fontSize:k.v.toString().length>4?13:15,
                      fontWeight:700,color:k.c,lineHeight:1}}>
                      {k.v}
                    </div>
                  </div>
                  <div style={{fontSize:10,fontWeight:700,color:'var(--t3)',letterSpacing:'.1em',textTransform:'uppercase'}}>{k.l}</div>
                </div>
              ))}
            </div>
          );
        })()}

      <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fill,minmax(290px,1fr))',gap:16,marginBottom:20}}>
        <Card sx={{padding:'18px 20px'}}>
          <Lbl>Career Funnel</Lbl>
          {funnel.map(s=>(
            <div key={s.id} style={{marginBottom:8}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:s.cnt>0?4:0}}>
                <div style={{width:8,height:8,borderRadius:'50%',background:s.cnt>0?s.color:'var(--t4)',flexShrink:0}}/>
                <span style={{fontSize:13,color:s.cnt>0?'var(--t1)':'var(--t3)',flex:1}}>{s.label}</span>
                <span style={{fontFamily:'var(--mono)',fontSize:13,color:s.cnt>0?s.color:'var(--t4)',fontWeight:700}}>{s.cnt}</span>
              </div>
              {s.cnt>0&&<div style={{marginLeft:16}}><Bar pct={s.cnt/Math.max(1,companies.length)*100} color={s.color} h={3}/></div>}
            </div>
          ))}
        </Card>
        <Card sx={{padding:'18px 20px'}}>
          <Lbl>⚡ Power Ranking DSS v10</Lbl>
          {ranked.length===0&&<div style={{color:'var(--t3)',fontSize:13,padding:'10px 0'}}>Avalie oportunidades para ver o ranking</div>}
          {ranked.slice(0,5).map((co,i)=>{
            const nowMs=Date.now();
            const fs=calcFinalScore(co.stage,so(co.ans),so(co.coAns),so(co.psyAns),so(co.masterAns),co.wstars||DEFAULT_WSTARS);
            const ev=calcEV(co.stage,so(co.ans),so(co.psyAns),co.wstars||DEFAULT_WSTARS);
            const rpn=calcRPN(so(co.coAns),so(co.ans),so(co.psyAns));
            const decay=calcDecay(co,nowMs);
            const fl=finalLabel(fs),evL=evLabel(ev);
            return(<div key={co.id} onClick={()=>nav('detail',co.id)}
              style={{display:'flex',alignItems:'center',gap:10,padding:'9px 0',cursor:'pointer',
                borderBottom:i<Math.min(4,ranked.length-1)?'1px solid var(--border)':'none'}}>
              <span style={{fontFamily:'var(--mono)',fontSize:16,fontWeight:900,color:i===0?'var(--gold)':i===1?'var(--t2)':'var(--t4)'}}>{i+1}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:14,fontWeight:700,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co.company}</div>
                <div style={{fontSize:11,color:'var(--t2)',overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}}>{co.role}</div>
                {co.nextActionDate&&<ActionCountdown date={co.nextActionDate} note={co.nextActionNote}/>}
              </div>
              <div style={{display:'flex',flexDirection:'column',alignItems:'flex-end',gap:2,flexShrink:0}}>
                {decay?<DecayBadge decay={decay} compact/>:<Tag label={`⚡${fs}%`} color={fl.c} sm/>}
                {ev>0&&<Tag label={`EV ${ev}%`} color={evL.c} sm/>}
                {rpn>=45&&<RPNBadge rpn={rpn}/>}
              </div>
            </div>);})}
        </Card>
      </div>
      <RankTable companies={companies} profile={profile} nav={nav}/>
      {companies.length===0&&(
        <Card sx={{padding:'36px',textAlign:'center',border:'2px dashed var(--border2)'}}>
          <div style={{fontSize:44,marginBottom:12}}>🎯</div>
          <div style={{fontSize:20,fontWeight:800,marginBottom:8}}>The Power of Decision</div>
          <div style={{color:'var(--t2)',fontSize:14,marginBottom:20}}>
            75 questões · Triple Matrix · Masters · ~91-94% acurácia
          </div>
          <button onClick={onAdd} style={{background:'var(--gold)',color:'#000',border:'none',
            borderRadius:'var(--r)',padding:'12px 28px',cursor:'pointer',fontSize:15,fontWeight:700}}>
            + Add First Opportunity
          </button>
        </Card>
      )}
    </div>);}

/* ════════════ PIPELINE VIEW — Extended v8 ════════════ */
function PipelineView({companies,nav,onDelete,onAdd,onUpdate}){
  const audit=PipelineAudit(companies);
  const [showAudit,setShowAudit]=useState(false);

  /* Auto-detect standby candidates (no contact > 14 days, not already standby/no/done) */
  const standbyAlert=companies.filter(co=>{
    if(['no','done','standby'].includes(co.stage))return false;
    if(!co.lastContactDate)return false;
    const days=Math.floor((Date.now()-new Date(co.lastContactDate).getTime())/86400000);
    return days>=14;
  });

  return(
    <div className="fup">
      <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
        <div style={{fontSize:22,fontWeight:900,letterSpacing:'-0.5px'}}>Career Funnel</div>
        <div style={{display:'flex',gap:8}}>
          {audit.totalIssues>0&&(
            <button onClick={()=>setShowAudit(!showAudit)}
              style={{padding:'7px 14px',background:showAudit?'rgba(255,59,48,.15)':'var(--s3)',
                border:`1px solid ${showAudit?'#FF3B3066':'var(--border)'}`,borderRadius:'var(--r)',
                cursor:'pointer',color:'#FF3B30',fontSize:12,fontWeight:700}}>
              ⚠ {audit.totalIssues} issue{audit.totalIssues!==1?'s':''}
            </button>
          )}
          <button onClick={onAdd} style={{background:'var(--gold)',color:'#000',border:'none',
            borderRadius:'var(--r)',padding:'9px 18px',cursor:'pointer',fontSize:14,fontWeight:700}}>+ New</button>
        </div>
      </div>

      {/* PIPELINE AUDIT PANEL */}
      {showAudit&&audit.alerts.length>0&&(
        <Card sx={{padding:'14px 18px',marginBottom:16,border:'1px solid #FF3B3033'}} className="fin">
          <Lbl c="#FF3B30" mb={10}>🔍 Pipeline Audit — {audit.totalIssues} issues encontrados</Lbl>
          {audit.alerts.map((a,i)=>(
            <div key={i} style={{display:'flex',alignItems:'center',gap:10,

                    const prio=PriorityService(co);
                    const statusColor={ativo:'#00D47E',follow:'#FFB800',negociação:'#32ADE6',

                      <div key={co.id} style={{background:'var(--s2)',border:'1px solid var(--border)',

                              background:'var(--s4)',color:'var(--t2)',border:'1px solid var(--border)'}}>
                              → {co.acao}</span>}
                            <span style={{padding:'1px 7px',borderRadius:999,fontSize:10,fontWeight:700,
                              background:prio.c+'22',color:prio.c,border:`1px solid ${prio.c}44`}}>
                              {prio.icon} {prio.p}</span>
                          </div>
                          {fs>0&&(
                            <div style={{display:'flex',gap:5,marginTop:5,flexWrap:'wrap'}}>
                              <Tag label={`⚡${fs}% ${fl.t}`} color={fl.c} sm/>
                              <Tag label={`~${acc}% acc`} color="var(--t3)" sm/>
                              {co.city&&<Tag label={`📍 ${co.city}`} color="var(--t3)" sm/>}
                            </div>
                          )}
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:5,flexShrink:0}}>
                          <button onClick={()=>nav('detail',co.id)}
                            style={{background:'var(--s3)',border:'1px solid var(--border)',
                              borderRadius:7,padding:'5px 12px',cursor:'pointer',
                              color:'var(--t1)',fontSize:12,fontWeight:700}}>Analyze →</button>
                          <button onClick={()=>{if(window.confirm(`Delete "${co.company}"?`))onDelete(co.id);}}
                            style={{background:'var(--redd)',border:'1px solid #FF3B3033',
                              borderRadius:7,padding:'5px 10px',cursor:'pointer',color:'var(--red)',fontSize:12}}>🗑</button>
                        </div>
                      </div>);})}
                </div>
              )}
              {opps.length===0&&(
                <div style={{padding:'10px 16px',background:'var(--s1)',borderBottom:'1px solid var(--border)'}}>
                  <div style={{fontSize:12,color:'var(--t4)',fontStyle:'italic'}}>

                  </div>

      </div>
      {companies.filter(c=>['no','done'].includes(c.stage)).length>0&&(

            {companies.filter(c=>['no','done'].includes(c.stage)).map(co=>(
              <div key={co.id} style={{background:'var(--s2)',border:'1px solid var(--border)',

              </div>
            ))}
          </div>
        </div>
      )}
    </div>);}

/* ════════════ REPORT — Extended v8 ════════════ */
function ReportView({companies,profile,data,onImport}){

    const nowMs=Date.now();
    const ranked=[...scored].sort((a,b)=>calcFinalScore(b.stage,so(b.ans),so(b.coAns),so(b.psyAns),so(b.masterAns),b.wstars||DEFAULT_WSTARS)-calcFinalScore(a.stage,so(a.ans),so(a.coAns),so(a.psyAns),so(a.masterAns),a.wstars||DEFAULT_WSTARS));

    const ev=top?calcEV(top.stage,so(top.ans),so(top.psyAns),top.wstars||DEFAULT_WSTARS):0;
    const rpn=top?calcRPN(so(top.coAns),so(top.ans),so(top.psyAns)):0;
    const coSc=top?calcCoScore_v10(so(top.coAns)):0;
    const decay=top?calcDecay(top,nowMs):null;
    const align=top?calcAlignment(so(top.coAns),so(top.psyAns)):null;
    const discStr=sa(profile.discSeq).join('-')||'não informado';
    return `CANDIDATO: ${profile.name} | ${profile.role||'Executivo'} | ${profile.seniority||'Sênior'}
DISC: ${discStr} | Área: ${profile.area||'—'}

Alertas: ${audit.alerts.slice(0,3).map(a=>`${a.company}: ${a.msg}`).join(' | ')||'nenhum'}

TOP OPORTUNIDADE: ${top?`${top.company} | ${top.role} | ${PIPE.find(s=>s.id===top.stage)?.label||top.stage}
  Score: ${fs}% | EV: ${ev}% | RPN (FMEA): ${rpn}/100 | CO: ${coSc}%

  const PROMPTS={
    rh:`Você é o RH sênior da empresa contratante avaliando este candidato. Seja honesto — represente a empresa, não o candidato.

    hh:`Você é headhunter executivo sênior representando o candidato. Quer que ele feche a melhor vaga.

[POSICIONAMENTO IDEAL]
(diferencial único vs outros finalistas)

[ESTRATÉGIA DE NEGOCIAÇÃO]

[DIAGNÓSTICO DE CARREIRA — 3 a 5 anos]

[PERFIL DO GESTOR INFERIDO]

    poker:`Você é jogador de poker profissional analisando a posição do candidato. Use linguagem de poker mas entregue análise acionável.

[SCORE CALIBRADO COM INCERTEZA]

[ANÁLISE BAYESIANA]
(dado o estágio e scores, distribuição de probabilidade real de fechamento)

[RECOMENDAÇÃO EV]

    bi:`Você é analista de dados sênior especializado em career analytics. Analise o FUNIL COMPLETO, não só a top vaga.

[DIAGNÓSTICO DO FUNIL DSS]

[PADRÃO 1 IDENTIFICADO]
(padrão estatístico ou comportamental recorrente — positivo ou negativo)

[PADRÃO 2 IDENTIFICADO]

[OTIMIZAÇÃO DO FUNIL]

    psy:`Você é psicóloga corporativa sênior com especialização em avaliação executiva e dinâmica de poder organizacional. Analise a dimensão psicológica e emocional deste processo seletivo.

[VEREDICTO EXECUTIVO]

  async function generateView(vid){
    setLoading(l=>({...l,[vid]:true}));setErr(e=>({...e,[vid]:''}));
    const ctx=buildCtx();
    const prompt=`${PROMPTS[vid]}\n\n═══ DADOS DSS v10 ═══\n${ctx}`;
    try{
      const r=await ai([{role:'user',content:prompt}],1400);
      setResults(res=>({...res,[vid]:r}));
    }catch(e){
      try{const r2=await ai([{role:'user',content:prompt.slice(0,1200)+'\nMáx 250 palavras.'}],700);setResults(res=>({...res,[vid]:r2}));}
      catch(e2){setErr(er=>({...er,[vid]:`Erro: ${e2.message}`}));}
    }
    setLoading(l=>({...l,[vid]:false}));
  }

  async function generateAll(){

        </div>
        {importErr&&<div style={{marginTop:10,padding:'8px 12px',background:'var(--redd)',borderRadius:'var(--r)',fontSize:12,color:'var(--red)'}}>{importErr}</div>}
      </Card>

      <Card sx={{padding:'16px 20px',marginBottom:16,border:'1px solid #BF5AF233',background:'linear-gradient(135deg,rgba(191,90,242,.04),var(--s2))'}}>
        <Lbl c="var(--purple)" mb={8}>🎲 Monte Carlo DSS · 100.000 iterações + Cenários A/B/C</Lbl>
        {!mcData&&!mcLoading&&(<button onClick={runMonteCarlo} style={{padding:'10px 20px',background:'var(--purple)',color:'#fff',border:'none',borderRadius:'var(--r)',cursor:'pointer',fontSize:13,fontWeight:700}}>▶ Rodar Simulação</button>)}
        {mcLoading&&<div style={{display:'flex',alignItems:'center',gap:10}}><Spin/><span style={{color:'var(--t2)',fontSize:13}}>Executando 100.000 iterações...</span></div>}
        {mcData&&!mcLoading&&(

            </div>
            {(()=>{
              const active=companies.filter(x=>!['no','done','standby'].includes(x.stage));
              const sorted=[...active].sort((a,b)=>calcFinalScore(b.stage,so(b.ans),so(b.coAns),so(b.psyAns),so(b.masterAns),b.wstars||DEFAULT_WSTARS)-calcFinalScore(a.stage,so(a.ans),so(a.coAns),so(a.psyAns),so(a.masterAns),a.wstars||DEFAULT_WSTARS));
              const t1=sorted[0],t2=sorted[1];
              if(!t1)return null;
              const p1=calcCandProb(t1.stage,so(t1.ans),t1.wstars||DEFAULT_WSTARS)/100;
              const p2=t2?calcCandProb(t2.stage,so(t2.ans),t2.wstars||DEFAULT_WSTARS)/100:0;
              const pA=Math.round(p1*p2*100),pB=Math.max(0,Math.round((p1+p2-p1*p2)*100)-pA),pC=Math.max(0,100-pA-pB);
              const evA=t2?Math.round((calcEV(t1.stage,so(t1.ans),so(t1.psyAns),t1.wstars||DEFAULT_WSTARS)+calcEV(t2.stage,so(t2.ans),so(t2.psyAns),t2.wstars||DEFAULT_WSTARS))/2):0;
              return <ScenCards mc={{scenA:{prob:pA,cos:[t1.company,t2?.company].filter(Boolean),ev:evA,label:'Dupla oferta · Poder máximo',action:`Accelerate ${t1.company}`},scenB:{prob:pB,cos:[t1.company],label:'Oferta única · Negociação normal',action:t2?`Use ${t2.company} como alternativa na negociação`:'Abrir novas candidaturas'},scenC:{prob:pC,cos:[],label:'Trava geral · Ativar hedge',action:'Injetar 3 candidaturas'}}}/>;
            })()}
            <button onClick={runMonteCarlo} style={{marginTop:8,background:'none',border:'none',cursor:'pointer',color:'var(--t3)',fontSize:11,textDecoration:'underline'}}>re-rodar</button>
          </div>
        )}
      </Card>

      {/* 7 VISÕES */}
      <Card sx={{padding:'18px 20px',border:'1px solid #FFB80033',background:'linear-gradient(135deg,rgba(255,184,0,.03),var(--s2))'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16,flexWrap:'wrap',gap:10}}>

          <button onClick={generateAll} disabled={genAll}

              background:genAll?'var(--s4)':'var(--gold)',color:genAll?'var(--t2)':'#000',
              border:'none',borderRadius:'var(--r)',cursor:genAll?'not-allowed':'pointer',fontSize:13,fontWeight:700}}>
            {genAll?<><Spin sz={14}/><span>Gerando todas...</span></>:<span>⚡ Gerar Todas as 9</span>}
          </button>
        </div>

        <div style={{display:'flex',gap:3,marginBottom:16,background:'var(--s1)',borderRadius:'var(--rl)',padding:4,overflowX:'auto'}}>
          {VIEWS.map(v=>{
            const done=!!results[v.id],busy=!!loading[v.id],active=activeV===v.id;
            return(<button key={v.id} onClick={()=>setActiveV(v.id)}
              style={{flex:'0 0 auto',padding:'8px 11px',
                background:active?'var(--s4)':'none',
                border:`1px solid ${active?v.color+'66':'transparent'}`,

              <span style={{fontSize:13}}>{v.icon}</span>

              {busy&&<Spin sz={10}/>}
              {done&&!busy&&<span style={{fontSize:10,color:v.color}}>●</span>}
            </button>);
          })}
        </div>

        <div style={{minHeight:120}}>
          {loading[activeV]&&<div style={{display:'flex',alignItems:'center',gap:12,padding:'24px 0'}}><Spin sz={20}/><span style={{color:'var(--t2)',fontSize:14}}>Consultando {av?.label}...</span></div>}
          {!loading[activeV]&&!results[activeV]&&(

              <div style={{fontSize:12,color:'var(--t3)',marginBottom:16}}>Perspectiva: <strong style={{color:av?.color}}>{av?.label}</strong></div>
              <button onClick={()=>generateView(activeV)}
                style={{padding:'11px 24px',background:av?.color,color:'#fff',border:'none',
                  borderRadius:'var(--r)',cursor:'pointer',fontSize:14,fontWeight:700}}>
                {av?.icon} Gerar Análise
              </button>
            </div>
          )}
          {err[activeV]&&<div style={{padding:'10px 14px',background:'var(--redd)',borderRadius:'var(--r)',color:'var(--red)',fontSize:13,marginBottom:10}}>{err[activeV]}</div>}
          {results[activeV]&&!loading[activeV]&&(
            <div className="fin">
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:14}}>

                  <button onClick={()=>{

                    const u=URL.createObjectURL(b);const a=document.createElement('a');
                    a.href=u;a.download=`cfi-v10-${activeV}-${Date.now()}.txt`;a.click();

              </div>
            </div>
          )}
        </div>
      </Card>
    </div>);
}
